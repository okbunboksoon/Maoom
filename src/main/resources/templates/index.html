<!DOCTYPE html>
<!--
	현재 애플리케이션의 기본 로그인 화면.

	1. 사용자가 ID와 비밀번호를 입력하면 POST /login으로 전송한다.
	2. UserController가 UserService.checkLogin()으로 tb_user 정보를 검증한다.
	3. 성공하면 Spring Security 세션을 만든 뒤 /main으로 이동한다.
	4. 실패하면 RedirectAttributes의 msg를 받아 이 화면의 오류 대화상자로 표시한다.

	화면의 아이디 저장은 서버가 아닌 브라우저 localStorage만 사용한다.
	보이는 비밀번호 입력값은 제출 직전에 서버가 읽는 hidden password로 복사한다.
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MAOOM Login</title>
	<link rel="stylesheet" href="/user/css/login.css?v=password-eye-1">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://kit.fontawesome.com/51db22a717.js" crossorigin="anonymous"></script>
</head>
<body>

	<main class="login-page">

		<h1 class="login-logo">MAOOM</h1>

		<section class="login-card">
			<form id="loginUser"
			      action="/login"
			      method="post"
			      autocomplete="off">

				<div class="login-inputs">
					<div class="input-field">
						<label for="username">아이디 또는 전화번호</label>
						<input type="text"
						       id="username"
						       name="username"
						       data-label="아이디"
						       autocomplete="username">
					</div>

					<div class="input-field">
						<label for="loginSecret">비밀번호</label>
						<input type="text"
						       id="loginSecret"
						       name="loginSecret"
						       class="password-masked"
						       data-label="비밀번호"
						       autocomplete="off"
						       autocapitalize="none"
						       spellcheck="false">
						<input type="hidden"
						       id="password"
						       name="password">
						<button type="button"
						        id="passwordToggle"
						        class="password-toggle"
						        aria-label="비밀번호 표시">
							<svg viewBox="0 0 24 24"
							     aria-hidden="true">
								<path class="eye-shape"
								      d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6z"/>
								<circle cx="12"
								        cy="12"
								        r="2.7"/>
								<path class="eye-slash"
								      d="M4 4l16 16"/>
							</svg>
						</button>
					</div>
				</div>

				<label class="save-id">
					<input type="checkbox" id="saveId">
					<span class="check-icon">
						<i class="fa-solid fa-check"></i>
					</span>
					<span>아이디 저장</span>
				</label>

				<button id="submitBtn"
				        class="login-button"
				        type="submit">로그인</button>

			</form>
		</section>

	</main>

	<div id="loginErrorBackdrop"
	     class="login-error-backdrop"
	     th:if="${msg}"
	     role="presentation">
		<section class="login-error-dialog"
		         role="alertdialog"
		         aria-modal="true"
		         aria-labelledby="loginErrorTitle"
		         aria-describedby="loginErrorMessage">
			<div class="login-error-icon">
				<i class="fa-solid fa-exclamation"></i>
			</div>
			<h2 id="loginErrorTitle">로그인 실패</h2>
			<p id="loginErrorMessage"
			   th:text="${msg}">아이디 또는 비밀번호가 틀립니다.</p>
			<button id="loginErrorConfirm"
			        type="button">확인</button>
		</section>
	</div>

	<script>
	$(function(){

		// 아이디 저장을 선택했던 브라우저에서는 이전 ID만 복원한다. 비밀번호는 저장하지 않는다.
		const savedId =
			localStorage.getItem('savedLoginId');

		if(savedId){
			$('#username').val(savedId);
			$('#saveId').prop('checked', true);
		}

		function validateValue(checkValue){
			return typeof checkValue === 'undefined'
				|| checkValue === null
				|| checkValue.trim() === '';
		}

		// CSS 마스킹 클래스를 바꿔 비밀번호 표시/숨김 상태와 접근성 문구를 함께 갱신한다.
		$('#passwordToggle').click(function(){

			const password =
				document.getElementById('loginSecret');

			const showPassword =
				!password.classList.contains(
					'password-visible'
				);

			password.classList.toggle(
				'password-visible',
				showPassword
			);

			$(this)
				.toggleClass(
					'password-shown',
					showPassword
				)
				.attr(
					'aria-label',
					showPassword
						? '비밀번호 숨기기'
						: '비밀번호 표시'
				);

		});

		/*
		 * 빈 값 검증 후 보이는 입력값을 hidden password에 복사한다.
		 * 이후 일반 form submit이 UserController의 POST /login으로 전달된다.
		 */
		$('#loginUser').submit(function(e){

			let isSubmit = true;

			$('#password').val(
				$('#loginSecret').val()
			);

			$('#loginUser input[type="text"],'
				+ '#loginUser input[type="password"]')
				.each(function(){

					if(validateValue($(this).val())){
						alert($(this).data('label') + '를 입력해주세요.');
						$(this).focus();
						isSubmit = false;
						return false;
					}

				});

			if(!isSubmit){
				e.preventDefault();
				return;
			}

			if($('#saveId').is(':checked')){
				localStorage.setItem(
					'savedLoginId',
					$('#username').val()
				);
			}else{
				localStorage.removeItem('savedLoginId');
			}

		});

	});

	window.addEventListener(
		'pageshow',
		function(event){

			// 로그아웃 뒤 뒤로가기로 인증된 이전 화면이 보이는 브라우저 캐시 문제를 막는다.
			if(event.persisted){
				window.location.reload();
			}

		}
	);
	</script>

	<script th:if="${msg}">
		// 서버가 로그인 실패 메시지를 전달한 경우에만 오류 대화상자 동작을 등록한다.
		const loginErrorBackdrop =
			document.getElementById('loginErrorBackdrop');
		const loginErrorConfirm =
			document.getElementById('loginErrorConfirm');

		function closeLoginError(){
			loginErrorBackdrop.remove();
			document.getElementById('loginSecret').focus();
		}

		loginErrorConfirm.addEventListener(
			'click',
			closeLoginError
		);

		loginErrorBackdrop.addEventListener(
			'click',
			function(event){
				if(event.target === loginErrorBackdrop){
					closeLoginError();
				}
			}
		);

		document.addEventListener(
			'keydown',
			function(event){
				if(event.key === 'Escape'
						&& document.body.contains(
							loginErrorBackdrop
						)){
					closeLoginError();
				}
			}
		);

		loginErrorConfirm.focus();
	</script>

</body>
</html>
