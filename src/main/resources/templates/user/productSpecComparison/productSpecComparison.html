<!DOCTYPE html>
<!--
    제품사양서 비교 팝업.

    1. 입력 경로는 서버 PC에서 접근 가능한 V서버/H서버 경로를 받는다.
    2. Before/After는 경로가 아니라 입력 경로 안의 파일명만 받는다.
    3. 특정 Key 옵션은 Before/After 양쪽 02 배치에 동일하게 적용된다.
    4. 서버는 작업 폴더에서 배치를 실행하고 입력 경로의 Result_Folder에 결과를 남긴다.
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품사양서 비교</title>
    <link rel="stylesheet" href="/user/css/RevisionPopup.css">
</head>
<body>
<main class="revision-page revision-estimate-page product-spec-page">
    <header class="revision-header">
        <div>
            <h1>제품사양서 비교</h1>
            <p>입력 경로의 Before/After 제품사양서를 비교 엑셀로 생성합니다.</p>
        </div>
    </header>

    <section class="revision-panel" aria-label="제품사양서 비교 배치 실행">
        <div class="step-title">
            <span>1</span>
            <div>
                <strong>입력 경로 선택</strong>
                <small>서버 PC에서 접근할 수 있는 경로를 입력하세요.(V서버, H서버)</small>
            </div>
        </div>

        <div class="path-row full-path-row">
            <label for="inputPath">입력경로</label>
            <input id="inputPath" type="text"
                   placeholder="경로를 입력하세요" autocomplete="off">
            <span></span>
            <span></span>
        </div>

        <div class="step-divider"></div>

        <div class="step-title">
            <span>2</span>
            <div>
                <strong>제품사양서 파일명</strong>
                <small>입력 경로 안에 있는 xlsx, xls 파일명을 입력하세요.</small>
            </div>
        </div>

        <div class="path-row full-path-row product-spec-drop-row" data-target="beforeFileName">
            <label for="beforeFileName">Before 파일명</label>
            <div class="file-name-row">
                <input id="beforeFileName" type="text"
                       placeholder="예: 2025_MY_제품사양서.xlsx"
                       autocomplete="off">
                <button type="button" class="action-button browse-button"
                        data-target="beforeFileName">찾기</button>
            </div>
            <small class="drop-hint">xlsx, xls 파일을 드래그하면 파일명만 입력됩니다.</small>
            <input type="file" class="hidden-file-input"
                   data-target="beforeFileName" accept=".xlsx,.xls">
        </div>

        <div class="path-row full-path-row product-spec-drop-row" data-target="afterFileName">
            <label for="afterFileName">After 파일명</label>
            <div class="file-name-row">
                <input id="afterFileName" type="text"
                       placeholder="예: 2026_MY_제품사양서.xlsx"
                       autocomplete="off">
                <button type="button" class="action-button browse-button"
                        data-target="afterFileName">찾기</button>
            </div>
            <small class="drop-hint">xlsx, xls 파일을 드래그하면 파일명만 입력됩니다.</small>
            <input type="file" class="hidden-file-input"
                   data-target="afterFileName" accept=".xlsx,.xls">
        </div>

        <div class="step-divider"></div>

        <div class="step-title">
            <span>3</span>
            <div>
                <strong>추출 옵션</strong>
                <small>전체 사양 또는 지정한 Key만 추출합니다.</small>
            </div>
        </div>

        <div class="type-row product-spec-option-row" aria-label="추출 옵션">
            <strong>추출 범위</strong>
            <label>
                <input type="radio" name="keyMode" value="ALL" checked>
                전체
            </label>
            <label>
                <input type="radio" name="keyMode" value="SPECIFIC">
                특정 사양군
            </label>
            <input id="keyInput" type="text" placeholder="K1 K2 K3"
                   autocomplete="off" disabled>
        </div>

        <section id="resultPanel" class="result-panel" hidden aria-live="polite">
            <div class="result-heading">
                <span id="statusIndicator" class="status-indicator"></span>
                <strong id="resultTitle">실행 준비 중</strong>
            </div>
            <p id="resultMessage"></p>
        </section>

        <footer class="popup-actions">
            <button type="button" id="runButton" class="action-button primary">
                실행
            </button>
            <button type="button" class="action-button" onclick="window.close()">
                취소
            </button>
        </footer>
    </section>
</main>

<script>
// 제품사양서 비교 화면은 파일 업로드를 하지 않는다.
// 찾아보기/드래그앤드롭은 파일명만 입력칸에 채우고, 서버는 입력경로 + 파일명으로 원본을 찾는다.
const inputPath = document.getElementById('inputPath');
const beforeFileName = document.getElementById('beforeFileName');
const afterFileName = document.getElementById('afterFileName');
const keyInput = document.getElementById('keyInput');
const runButton = document.getElementById('runButton');
const resultPanel = document.getElementById('resultPanel');
const statusIndicator = document.getElementById('statusIndicator');
const resultTitle = document.getElementById('resultTitle');
const resultMessage = document.getElementById('resultMessage');

document.querySelectorAll('input[name="keyMode"]').forEach(input => {
    input.addEventListener('change', () => {
        const specific = selectedKeyMode() === 'SPECIFIC';
        keyInput.disabled = !specific;
        if (!specific) {
            keyInput.value = '';
        } else {
            keyInput.focus();
        }
    });
});

document.querySelectorAll('.browse-button').forEach(button => {
    button.addEventListener('click', () => {
        document.querySelector(
            `.hidden-file-input[data-target="${button.dataset.target}"]`
        ).click();
    });
});

document.querySelectorAll('.hidden-file-input').forEach(input => {
    input.addEventListener('change', () => {
        if (input.files.length > 0) {
            setFileName(input.dataset.target, input.files[0].name);
        }
        input.value = '';
    });
});

document.querySelectorAll('.product-spec-drop-row').forEach(row => {
    row.addEventListener('dragover', event => {
        event.preventDefault();
        row.classList.add('is-dragging');
    });
    row.addEventListener('dragleave', () => {
        row.classList.remove('is-dragging');
    });
    row.addEventListener('drop', event => {
        event.preventDefault();
        row.classList.remove('is-dragging');
        const file = event.dataTransfer.files[0];
        if (file) {
            setFileName(row.dataset.target, file.name);
        }
    });
});

runButton.addEventListener('click', runComparison);
[inputPath, beforeFileName, afterFileName, keyInput].forEach(input => {
    input.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            runComparison();
        }
    });
});

function selectedKeyMode() {
    return document.querySelector('input[name="keyMode"]:checked').value;
}

function setFileName(targetId, name) {
    if (!/\.(xlsx|xls)$/i.test(name)) {
        showResult('error', '파일 형식 확인 필요',
            'xlsx 또는 xls 파일만 사용할 수 있습니다.');
        return;
    }
    document.getElementById(targetId).value = name;
}

async function runComparison() {
    // ProductSpecComparisonRequest와 같은 구조로 서버에 전달한다.
    const payload = {
        inputPath: inputPath.value.trim(),
        beforeFileName: beforeFileName.value.trim(),
        afterFileName: afterFileName.value.trim(),
        keyMode: selectedKeyMode(),
        keys: keyInput.value.trim()
    };

    if (!payload.inputPath) {
        showResult('error', '입력 경로 확인 필요',
            '입력 경로를 입력하세요.');
        inputPath.focus();
        return;
    }
    if (!payload.beforeFileName) {
        showResult('error', 'Before 파일명 확인 필요',
            'Before 제품사양서 파일명을 입력하세요.');
        beforeFileName.focus();
        return;
    }
    if (!payload.afterFileName) {
        showResult('error', 'After 파일명 확인 필요',
            'After 제품사양서 파일명을 입력하세요.');
        afterFileName.focus();
        return;
    }
    if (payload.keyMode === 'SPECIFIC' && !payload.keys) {
        showResult('error', 'Key 확인 필요',
            '특정 Key를 K1 K2 K3 형식으로 입력하세요.');
        keyInput.focus();
        return;
    }

    setBusy(true);
    showResult('running', '제품사양서 비교 실행 중',
        '완료될 때까지 창을 닫지 마세요.');

    try {
        const response = await fetch('/api/product-spec-comparison/run', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (!response.ok || !result.success) {
            showResult('error', '제품사양서 비교 실패',
                lastLog(result.logs) || '제품사양서 비교 중 오류가 발생했습니다.');
            return;
        }

        showResult('success', '제품사양서 비교 완료',
            `결과 경로: ${result.resultPath}`);
    } catch (error) {
        showResult('error', '통신 오류',
            '서버 응답을 받지 못했습니다: ' + error.message);
    } finally {
        setBusy(false);
    }
}

function setBusy(busy) {
    runButton.disabled = busy;
    inputPath.disabled = busy;
    beforeFileName.disabled = busy;
    afterFileName.disabled = busy;
    keyInput.disabled = busy || selectedKeyMode() !== 'SPECIFIC';
    document.querySelectorAll('input[name="keyMode"]').forEach(input => {
        input.disabled = busy;
    });
    document.querySelectorAll('.browse-button').forEach(button => {
        button.disabled = busy;
    });
    runButton.textContent = busy ? '실행 중...' : '비교 파일 생성';
}

function showResult(type, title, message) {
    resultPanel.hidden = false;
    resultPanel.dataset.status = type;
    statusIndicator.classList.toggle('is-running', type === 'running');
    resultTitle.textContent = title;
    resultMessage.textContent = message || '';
    resizePopupToContent();
}

function lastLog(logs) {
    return Array.isArray(logs) && logs.length > 0
        ? logs[logs.length - 1]
        : '';
}

function resizePopupToContent(){
    requestAnimationFrame(() => {
        const browserFrameHeight = window.outerHeight - window.innerHeight;
        const contentHeight = document.documentElement.scrollHeight;
        const verticalMargin = 36;
        const nextHeight = Math.min(
            screen.availHeight,
            contentHeight + browserFrameHeight + verticalMargin
        );
        if(Math.abs(nextHeight - window.outerHeight) > 8){
            window.resizeTo(window.outerWidth, nextHeight);
        }
    });
}
</script>
</body>
</html>
