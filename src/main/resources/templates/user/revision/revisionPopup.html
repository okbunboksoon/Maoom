<!DOCTYPE html>
<!--
    DITA 정제 팝업의 연결 흐름

    1. 화면이 열리면 GET /api/revision/options로 실행 가능한 XSL 단계를 조회한다.
    2. 사용자가 Input/Output 경로와 실행 단계를 선택한다.
    3. POST /api/revision/run으로 RevisionRunRequest를 전송한다.
    4. RevisionController가 RevisionPipelineService에 실행을 위임한다.
    5. 서비스는 임시 작업 폴더에서 Saxon과 XSL을 순서대로 실행한다.
    6. 결과 파일과 revision.log를 지정한 Output 아래의 실행별 폴더에 저장한다.

    이 화면은 경로 입력, 단계 선택과 결과 표시만 담당한다.
    파일 검증과 실제 XSL 실행 규칙은 RevisionPipelineService에서 관리한다.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DITA 정제</title>
<link rel="stylesheet" href="/user/css/RevisionPopup.css">
</head>
<body>
<main class="revision-page revision-estimate-page">
    <header class="revision-header">
        <div>
            <h1>정제</h1>
            <p>입력 경로를 작업 폴더로 복사한 뒤 선택한 형태로 변환합니다.</p>
        </div>
    </header>

    <section class="revision-panel" aria-label="정제 배치 실행">
        <div class="step-title">
            <span>1</span>
            <div>
                <strong>입력 경로 선택</strong>
                <small>서버 PC에서 접근할 수 있는 경로를 입력하세요.(V서버, H서버)</small>
            </div>
        </div>

        <div class="path-row">
            <label id="pathTitle" for="inputPath">입력경로</label>
            <input type="text" id="inputPath"
                   placeholder="경로를 입력하세요" autocomplete="off">
        </div>

        <input type="hidden" id="outputPath">

        <div class="type-row" aria-label="OutPutType">
            <strong>OutPutType</strong>
            <label>
                <input type="checkbox" name="outputType" value="XML">
                xml
            </label>
            <label>
                <input type="checkbox" name="outputType" value="DITA">
                dita
            </label>
        </div>

        <div class="step-divider"></div>

        <div class="step-title">
            <span>2</span>
            <div>
                <strong id="optionTitle">옵션</strong>
                <small>필요한 정제 옵션을 선택하세요.</small>
            </div>
            <p id="selectionSummary">항목을 불러오는 중입니다.</p>
            <button type="button" id="toggleAllOptions" class="secondary-button compact-toggle">
                전체 해제
            </button>
        </div>
        <div id="optionList" class="option-list" aria-live="polite"></div>

        <section id="resultPanel" class="result-panel" hidden aria-live="polite">
            <div class="result-heading">
                <span id="statusIndicator" class="status-indicator"></span>
                <strong id="resultTitle">실행 준비 중</strong>
            </div>
            <p id="resultMessage"></p>
        </section>

        <footer class="popup-actions">
            <button type="button" id="runButton" class="action-button primary">
                실행
            </button>
            <button type="button" class="action-button" onclick="window.close()">
                취소
            </button>
        </footer>
    </section>
</main>

<div id="bookmapModal" class="modal-backdrop" hidden>
    <section class="bookmap-modal" role="dialog" aria-modal="true"
             aria-labelledby="bookmapModalTitle">
        <div class="modal-title-row">
            <span class="modal-mark"></span>
            <div>
                <h2 id="bookmapModalTitle">bookmap.xml 생성</h2>
                <p>XML 입력에 사용할 mapname 파일명을 입력하세요.</p>
            </div>
        </div>
        <label class="modal-field" for="bookmapMapNameInput">
            <span>mapname</span>
            <input type="text" id="bookmapMapNameInput"
                   placeholder="예: KIA-SP3-ICE-HEV-en_GB-2027.ditamap"
                   autocomplete="off">
        </label>
        <p id="bookmapModalMessage" class="modal-message" hidden></p>
        <div class="modal-actions">
            <button type="button" id="bookmapCancelButton"
                    class="modal-button secondary">취소</button>
            <button type="button" id="bookmapConfirmButton"
                    class="modal-button primary">확인</button>
        </div>
    </section>
</div>

<script>
// 화면에서 반복해서 사용하는 요소를 한 번만 찾아 변수로 보관한다.
const optionList = document.getElementById('optionList');
const toggleAllButton = document.getElementById('toggleAllOptions');
const selectionSummary = document.getElementById('selectionSummary');
const runButton = document.getElementById('runButton');
const resultPanel = document.getElementById('resultPanel');
const resultTitle = document.getElementById('resultTitle');
const resultMessage = document.getElementById('resultMessage');
const statusIndicator = document.getElementById('statusIndicator');
const bookmapModal = document.getElementById('bookmapModal');
const bookmapMapNameInput = document.getElementById('bookmapMapNameInput');
const bookmapModalMessage = document.getElementById('bookmapModalMessage');
const bookmapConfirmButton = document.getElementById('bookmapConfirmButton');
const bookmapCancelButton = document.getElementById('bookmapCancelButton');

let options = [];
let pendingBookmapMapName = '';
let bookmapModalResolver = null;

// 현재 체크된 정제 단계 input만 배열로 반환한다.
function selectedInputs() {
    return Array.from(
        optionList.querySelectorAll('input[name="revisionOption"]:checked')
    );
}

// 전체 단계 수와 선택 수를 안내하고 전체 선택/해제 버튼 문구를 맞춘다.
function updateSelectionSummary() {
    const selectedCount = selectedInputs().length;
    selectionSummary.textContent =
        `전체 ${options.length}개 중 ${selectedCount}개 선택`;
    toggleAllButton.textContent =
        selectedCount === options.length ? '전체 해제' : '전체 선택';
}

/*
 * RevisionOptionDto 목록을 체크박스로 그린다.
 * 배열 순서는 RevisionPipelineService의 실제 파이프라인 실행 순서와 같다.
 */
function renderOptions(items) {
    const preferredOrder = [
        'FILE_NAME_KEEP',
        'REMOVE_SIMPLE_OPERATION_DELIVERY_TARGET',
        'DELETE_DRAFT_COMMENT'
    ];
    const compactLabels = {
        FILE_NAME_KEEP: '파일명 변경(ex t00000, t00001)',
        REMOVE_SIMPLE_OPERATION_DELIVERY_TARGET: 'deliveryTarget 및 Simple operation 지우기',
        DELETE_DRAFT_COMMENT: 'Draft Comment 지우기'
    };
    const byId = new Map(items.map(function(item) {
        return [item.id, item];
    }));
    options = preferredOrder
        .filter(function(id) {
            return byId.has(id);
        })
        .map(function(id) {
            const item = byId.get(id);
            return {
                id: item.id,
                label: compactLabels[id] || item.label,
                description: item.description
            };
        });
    optionList.replaceChildren();

    options.forEach(function(option) {
        const label = document.createElement('label');
        label.className = 'option-item';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.name = 'revisionOption';
        checkbox.value = option.id;
        checkbox.checked = false;
        checkbox.addEventListener('change', updateSelectionSummary);

        const text = document.createElement('span');
        text.className = 'option-text';

        const name = document.createElement('strong');
        name.textContent = option.label;

        const description = document.createElement('small');
        description.textContent = option.description;

        text.append(name, description);
        label.append(checkbox, text);
        optionList.append(label);
    });

    updateSelectionSummary();
}

// 실행 중, 성공, 실패 상태를 공통 결과 패널에 표시한다.
function showResult(type, title, message, logs) {
    resultPanel.hidden = false;
    resultPanel.dataset.status = type;
    resultTitle.textContent = title;
    resultMessage.textContent = message || '';
    statusIndicator.classList.toggle('is-running', type === 'running');
    resultPanel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
    resizePopupToContent();
}

function resizePopupToContent(){
    requestAnimationFrame(() => {
        const browserFrameHeight = window.outerHeight - window.innerHeight;
        const contentHeight = document.documentElement.scrollHeight;
        const verticalMargin = 36;
        const nextHeight = Math.min(
            screen.availHeight,
            contentHeight + browserFrameHeight + verticalMargin
        );
        if(Math.abs(nextHeight - window.outerHeight) > 8){
            window.resizeTo(window.outerWidth, nextHeight);
        }
    });
}

function buildOutputPath(inputPath) {
    return inputPath.replace(/[\\\/]+$/, '') + '\\Result_Folder';
}

function isBookmapMapNameRequired(result) {
    const messages = result.logs || [];
    return messages.some(function(message) {
        return message.includes('BOOKMAP_MAPNAME_REQUIRED:');
    });
}

function openBookmapModal(defaultValue) {
    bookmapModal.hidden = false;
    bookmapModalMessage.hidden = true;
    bookmapModalMessage.textContent = '';
    bookmapMapNameInput.value = defaultValue || '';
    bookmapMapNameInput.focus();
    bookmapMapNameInput.select();

    return new Promise(function(resolve) {
        bookmapModalResolver = resolve;
    });
}

function closeBookmapModal(value) {
    bookmapModal.hidden = true;
    if (bookmapModalResolver) {
        bookmapModalResolver(value);
        bookmapModalResolver = null;
    }
}

function confirmBookmapModal() {
    const mapName = bookmapMapNameInput.value.trim();
    if (!mapName) {
        bookmapModalMessage.hidden = false;
        bookmapModalMessage.textContent = 'mapname 파일명을 입력하세요.';
        bookmapMapNameInput.focus();
        return;
    }
    closeBookmapModal(mapName);
}

function selectedValue(name) {
    const checked = document.querySelector(`input[name="${name}"]:checked`);
    return checked ? checked.value : '';
}

function enforceSingleSelection(name) {
    document.querySelectorAll(`input[name="${name}"]`).forEach(function(input) {
        input.addEventListener('change', function() {
            if (!input.checked) {
                return;
            }
            document.querySelectorAll(`input[name="${name}"]`).forEach(function(other) {
                if (other !== input) {
                    other.checked = false;
                }
            });
        });
    });
}

toggleAllButton.addEventListener('click', function() {
    const inputs = Array.from(
        optionList.querySelectorAll('input[name="revisionOption"]')
    );
    const shouldCheck = selectedInputs().length !== inputs.length;
    inputs.forEach(function(input) {
        input.checked = shouldCheck;
    });
    updateSelectionSummary();
});

/*
 * 사용자가 입력한 경로와 단계 ID를 RevisionRunRequest 형식의 JSON으로 전송한다.
 * 서버는 성공 여부, 결과 경로, 완료 단계와 Saxon 로그를 RevisionRunResult로 돌려준다.
 */
runButton.addEventListener('click', async function() {
    const inputPath = document.getElementById('inputPath').value.trim();
    const outputPath = buildOutputPath(inputPath);
    const outputType = selectedValue('outputType');
    const optionIds = selectedInputs().map(function(input) {
        return input.value;
    });

    if (!inputPath) {
        showResult('error', '경로 확인 필요',
            '입력 경로를 입력하세요.', []);
        return;
    }
    if (!outputType) {
        showResult('error', '형태 선택 필요',
            'OutPut형태를 선택하세요.', []);
        return;
    }
    runButton.disabled = true;
    runButton.textContent = '실행 중...';
    showResult('running', '정제 실행 중',
        '파일 수와 선택 항목에 따라 시간이 걸릴 수 있습니다.', []);

    try {
        const payload = {
            inputPath,
            outputPath,
            outputType,
            optionIds
        };
        if (pendingBookmapMapName) {
            payload.bookmapMapName = pendingBookmapMapName;
        }

        const response = await fetch('/api/revision/run', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (!response.ok || !result.success) {
            if (isBookmapMapNameRequired(result)) {
                const mapName = await openBookmapModal(pendingBookmapMapName);
                if (mapName) {
                    pendingBookmapMapName = mapName;
                    setTimeout(function() {
                        runButton.click();
                    }, 0);
                    return;
                }
            }
            showResult('error', '정제 실패',
                result.logs?.at(-1) || '정제 중 오류가 발생했습니다.',
                []);
            return;
        }

        pendingBookmapMapName = '';
        showResult('success', '정제 완료',
            `결과 경로: ${result.outputPath}`, []);
    } catch (error) {
        showResult('error', '통신 오류',
            '서버 응답을 받지 못했습니다: ' + error.message, []);
    } finally {
        runButton.disabled = false;
        runButton.textContent = '실행';
    }
});

// 최초 진입 시 서버의 파이프라인 정의를 읽어 화면 선택 항목을 구성한다.
fetch('/api/revision/options')
    .then(function(response) {
        if (!response.ok) {
            throw new Error('정제 항목을 불러오지 못했습니다.');
        }
        return response.json();
    })
    .then(renderOptions)
    .catch(function(error) {
        showResult('error', '초기화 실패', error.message, []);
        runButton.disabled = true;
    });

enforceSingleSelection('outputType');

bookmapConfirmButton.addEventListener('click', confirmBookmapModal);
bookmapCancelButton.addEventListener('click', function() {
    closeBookmapModal('');
});
bookmapMapNameInput.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        event.preventDefault();
        confirmBookmapModal();
    }
    if (event.key === 'Escape') {
        event.preventDefault();
        closeBookmapModal('');
    }
});
</script>
</body>
</html>
