<!DOCTYPE html>
<!--
    DITA м •м ң нҢқм—…мқҳ м—°кІ° нқҗлҰ„

    1. нҷ”л©ҙмқҙ м—ҙлҰ¬л©ҙ GET /api/revision/optionsлЎң мӢӨн–ү к°ҖлҠҘн•ң XSL лӢЁкі„лҘј мЎ°нҡҢн•ңлӢӨ.
    2. мӮ¬мҡ©мһҗк°Җ Input/Output кІҪлЎңмҷҖ мӢӨн–ү лӢЁкі„лҘј м„ нғқн•ңлӢӨ.
    3. POST /api/revision/runмңјлЎң RevisionRunRequestлҘј м „мҶЎн•ңлӢӨ.
    4. RevisionControllerк°Җ RevisionPipelineServiceм—җ мӢӨн–үмқ„ мң„мһ„н•ңлӢӨ.
    5. м„ңл№„мҠӨлҠ” мһ„мӢң мһ‘м—… нҸҙлҚ”м—җм„ң Saxonкіј XSLмқ„ мҲңм„ңлҢҖлЎң мӢӨн–үн•ңлӢӨ.
    6. кІ°кіј нҢҢмқјкіј revision.logлҘј м§Җм •н•ң Output м•„лһҳмқҳ мӢӨн–үлі„ нҸҙлҚ”м—җ м ҖмһҘн•ңлӢӨ.

    мқҙ нҷ”л©ҙмқҖ кІҪлЎң мһ…л Ҙ, лӢЁкі„ м„ нғқкіј кІ°кіј н‘ңмӢңл§Ң лӢҙлӢ№н•ңлӢӨ.
    нҢҢмқј кІҖмҰқкіј мӢӨм ң XSL мӢӨн–ү к·ңм№ҷмқҖ RevisionPipelineServiceм—җм„ң кҙҖлҰ¬н•ңлӢӨ.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DITA м •м ң</title>
<link rel="stylesheet" href="/user/css/RevisionPopup.css">
</head>
<body>
<main class="revision-page">
    <header class="revision-header">
        <div>
            <h1>DITA м •м ң</h1>
            <p>м„ нғқн•ң ліҖнҷҳл§Ң мң„м—җм„ң м•„лһҳ мҲңм„ңлЎң мӢӨн–үн•©лӢҲлӢӨ.</p>
        </div>
        <span class="revision-badge">XSL Pipeline</span>
    </header>

    <section class="path-section" aria-labelledby="pathTitle">
        <div class="section-title-row">
            <div>
                <h2 id="pathTitle">мһ…м¶ңл Ҙ кІҪлЎң</h2>
                <p>м„ңлІ„ PCм—җм„ң м ‘к·јн•  мҲҳ мһҲлҠ” м ҲлҢҖкІҪлЎңлҘј мһ…л Ҙн•ҳм„ёмҡ”.</p>
            </div>
        </div>

        <label class="path-field" for="inputPath">
            <span>Input</span>
            <input type="text" id="inputPath"
                   placeholder="мҳҲ: C:\Users\adobe\Desktop\task" autocomplete="off">
            <small>DITAмҷҖ DITAMAPмқҙ мһҲлҠ” topics нҸҙлҚ” лҳҗлҠ” topicsмқҳ мғҒмң„ нҸҙлҚ”</small>
        </label>

        <label class="path-field" for="outputPath">
            <span>Output</span>
            <input type="text" id="outputPath"
                   placeholder="мҳҲ: C:\Users\adobe\Desktop\task" autocomplete="off">
            <small>мӣҗліёкіј л¶„лҰ¬лҗң м¶ңл Ҙ нҸҙлҚ”лҘј м§Җм •н•ҳм„ёмҡ”. мӢӨн–үлі„ н•ҳмң„ нҸҙлҚ”к°Җ мғқм„ұлҗ©лӢҲлӢӨ.</small>
        </label>
    </section>

    <section class="option-section" aria-labelledby="optionTitle">
        <div class="section-title-row">
            <div>
                <h2 id="optionTitle">м •м ң н•ӯлӘ©</h2>
                <p id="selectionSummary">н•ӯлӘ©мқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ.</p>
            </div>
            <button type="button" id="toggleAllOptions" class="secondary-button">
                м „мІҙ н•ҙм ң
            </button>
        </div>
        <div id="optionList" class="option-list" aria-live="polite"></div>
    </section>

    <section id="resultPanel" class="result-panel" hidden aria-live="polite">
        <div class="result-heading">
            <span id="statusIndicator" class="status-indicator"></span>
            <strong id="resultTitle">мӢӨн–ү мӨҖл№„ мӨ‘</strong>
        </div>
        <p id="resultMessage"></p>
        <pre id="resultLogs"></pre>
    </section>

    <div class="popup-actions">
        <button type="button" id="runButton" class="action-button primary">
            м •м ң мӢӨн–ү
        </button>
        <button type="button" class="action-button" onclick="window.close()">
            лӢ«кё°
        </button>
    </div>
</main>

<script>
// нҷ”л©ҙм—җм„ң л°ҳліөн•ҙм„ң мӮ¬мҡ©н•ҳлҠ” мҡ”мҶҢлҘј н•ң лІҲл§Ң м°ҫм•„ ліҖмҲҳлЎң ліҙкҙҖн•ңлӢӨ.
const optionList = document.getElementById('optionList');
const toggleAllButton = document.getElementById('toggleAllOptions');
const selectionSummary = document.getElementById('selectionSummary');
const runButton = document.getElementById('runButton');
const resultPanel = document.getElementById('resultPanel');
const resultTitle = document.getElementById('resultTitle');
const resultMessage = document.getElementById('resultMessage');
const resultLogs = document.getElementById('resultLogs');
const statusIndicator = document.getElementById('statusIndicator');

let options = [];

// нҳ„мһ¬ мІҙнҒ¬лҗң м •м ң лӢЁкі„ inputл§Ң л°°м—ҙлЎң л°ҳнҷҳн•ңлӢӨ.
function selectedInputs() {
    return Array.from(
        optionList.querySelectorAll('input[name="revisionOption"]:checked')
    );
}

// м „мІҙ лӢЁкі„ мҲҳмҷҖ м„ нғқ мҲҳлҘј м•ҲлӮҙн•ҳкі  м „мІҙ м„ нғқ/н•ҙм ң лІ„нҠј л¬ёкө¬лҘј л§һм¶ҳлӢӨ.
function updateSelectionSummary() {
    const selectedCount = selectedInputs().length;
    selectionSummary.textContent =
        `м „мІҙ ${options.length}к°ң мӨ‘ ${selectedCount}к°ң м„ нғқ`;
    toggleAllButton.textContent =
        selectedCount === options.length ? 'м „мІҙ н•ҙм ң' : 'м „мІҙ м„ нғқ';
}

/*
 * RevisionOptionDto лӘ©лЎқмқ„ мІҙнҒ¬л°•мҠӨлЎң к·ёлҰ°лӢӨ.
 * л°°м—ҙ мҲңм„ңлҠ” RevisionPipelineServiceмқҳ мӢӨм ң нҢҢмқҙн”„лқјмқё мӢӨн–ү мҲңм„ңмҷҖ к°ҷлӢӨ.
 */
function renderOptions(items) {
    options = items;
    optionList.replaceChildren();

    items.forEach(function(option, index) {
        const label = document.createElement('label');
        label.className = 'option-item';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.name = 'revisionOption';
        checkbox.value = option.id;
        checkbox.checked = true;
        checkbox.addEventListener('change', updateSelectionSummary);

        const order = document.createElement('span');
        order.className = 'option-order';
        order.textContent = String(index + 1).padStart(2, '0');

        const text = document.createElement('span');
        text.className = 'option-text';

        const name = document.createElement('strong');
        name.textContent = option.label;

        const description = document.createElement('small');
        description.textContent = option.description;

        text.append(name, description);
        label.append(checkbox, order, text);
        optionList.append(label);
    });

    updateSelectionSummary();
}

// мӢӨн–ү мӨ‘, м„ұкіө, мӢӨнҢЁ мғҒнғңлҘј кіөнҶө кІ°кіј нҢЁл„җм—җ н‘ңмӢңн•ңлӢӨ.
function showResult(type, title, message, logs) {
    resultPanel.hidden = false;
    resultPanel.dataset.status = type;
    resultTitle.textContent = title;
    resultMessage.textContent = message || '';
    resultLogs.textContent = Array.isArray(logs) ? logs.join('\n') : '';
    statusIndicator.classList.toggle('is-running', type === 'running');
    resultPanel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

toggleAllButton.addEventListener('click', function() {
    const inputs = Array.from(
        optionList.querySelectorAll('input[name="revisionOption"]')
    );
    const shouldCheck = selectedInputs().length !== inputs.length;
    inputs.forEach(function(input) {
        input.checked = shouldCheck;
    });
    updateSelectionSummary();
});

/*
 * мӮ¬мҡ©мһҗк°Җ мһ…л Ҙн•ң кІҪлЎңмҷҖ лӢЁкі„ IDлҘј RevisionRunRequest нҳ•мӢқмқҳ JSONмңјлЎң м „мҶЎн•ңлӢӨ.
 * м„ңлІ„лҠ” м„ұкіө м—¬л¶Җ, кІ°кіј кІҪлЎң, мҷ„лЈҢ лӢЁкі„мҷҖ Saxon лЎңк·ёлҘј RevisionRunResultлЎң лҸҢл ӨмӨҖлӢӨ.
 */
runButton.addEventListener('click', async function() {
    const inputPath = document.getElementById('inputPath').value.trim();
    const outputPath = document.getElementById('outputPath').value.trim();
    const optionIds = selectedInputs().map(function(input) {
        return input.value;
    });

    if (!inputPath || !outputPath) {
        showResult('error', 'кІҪлЎң нҷ•мқё н•„мҡ”',
            'Inputкіј Output м ҲлҢҖкІҪлЎңлҘј лӘЁл‘җ мһ…л Ҙн•ҳм„ёмҡ”.', []);
        return;
    }
    if (!optionIds.length) {
        showResult('error', 'н•ӯлӘ© м„ нғқ н•„мҡ”',
            'мӢӨн–үн•  м •м ң н•ӯлӘ©мқ„ н•ҳлӮҳ мқҙмғҒ м„ нғқн•ҳм„ёмҡ”.', []);
        return;
    }

    runButton.disabled = true;
    showResult('running', 'м •м ң мӢӨн–ү мӨ‘',
        'нҢҢмқј мҲҳмҷҖ м„ нғқ н•ӯлӘ©м—җ л”°лқј мӢңк°„мқҙ кұёлҰҙ мҲҳ мһҲмҠөлӢҲлӢӨ.', []);

    try {
        const response = await fetch('/api/revision/run', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({inputPath, outputPath, optionIds})
        });
        const result = await response.json();

        if (!response.ok || !result.success) {
            showResult('error', 'м •м ң мӢӨнҢЁ',
                result.logs?.at(-1) || 'м •м ң мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.',
                result.logs);
            return;
        }

        showResult('success', 'м •м ң мҷ„лЈҢ',
            `кІ°кіј кІҪлЎң: ${result.outputPath}`, result.logs);
    } catch (error) {
        showResult('error', 'нҶөмӢ  мҳӨлҘҳ',
            'м„ңлІ„ мқ‘лӢөмқ„ л°ӣм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ: ' + error.message, []);
    } finally {
        runButton.disabled = false;
    }
});

// мөңмҙҲ м§„мһ… мӢң м„ңлІ„мқҳ нҢҢмқҙн”„лқјмқё м •мқҳлҘј мқҪм–ҙ нҷ”л©ҙ м„ нғқ н•ӯлӘ©мқ„ кө¬м„ұн•ңлӢӨ.
fetch('/api/revision/options')
    .then(function(response) {
        if (!response.ok) {
            throw new Error('м •м ң н•ӯлӘ©мқ„ л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.');
        }
        return response.json();
    })
    .then(renderOptions)
    .catch(function(error) {
        showResult('error', 'мҙҲкё°нҷ” мӢӨнҢЁ', error.message, []);
        runButton.disabled = true;
    });
</script>
</body>
</html>
