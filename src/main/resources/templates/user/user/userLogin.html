<!DOCTYPE html>
<!-- 이전 로그인 화면 시안. 현재 기본 로그인은 templates/index.html을 사용한다. -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}
.login-box{
    width:300px;
    padding:30px;
    background:white;
    border:1px solid #ddd;
}
.login-box h2{
    text-align:center;
}
.login-box input{
    width:100%;
    height:35px;
    margin-bottom:10px;
}
.login-box button{
    width:40%;
    height:40px;
	float:right;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Maoom</h2>

    <form action="/main" method="post">
        <input type="text" name="username" placeholder="ID">
        <input type="password" name="password" placeholder="PW">
        <button type="submit">확인</button>
    </form>
</div>

</body>
</html>
