<!DOCTYPE html>
<!--
	이전 로그인 화면 시안으로 현재 로그인 경로에서는 사용하지 않는다.
	실제 기본 로그인은 templates/index.html -> POST /login 흐름을 사용한다.
	향후 이 파일을 다시 사용하려면 현재 인증 처리 방식에 맞게
	action="/login"과 Spring Security 세션 생성을 연결해야 한다.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}
.login-box{
    width:300px;
    padding:30px;
    background:white;
    border:1px solid #ddd;
}
.login-box h2{
    text-align:center;
}
.login-box input{
    width:100%;
    height:35px;
    margin-bottom:10px;
}
.login-box button{
    width:40%;
    height:40px;
	float:right;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Maoom</h2>

    <!-- 현재는 라우팅되지 않는 시안 form이며 운영 로그인 처리와 연결되어 있지 않다. -->
    <form action="/main" method="post">
        <input type="text" name="username" placeholder="ID">
        <input type="password" name="password" placeholder="PW">
        <button type="submit">확인</button>
    </form>
</div>

</body>
</html>
