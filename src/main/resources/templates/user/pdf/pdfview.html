/*
 * 두 내보내기 버튼이 공유하는 다운로드 처리.
 * fetch 응답의 Content-Disposition에서 서버가 만든 파일명을 읽어 Blob으로 저장한다.
 */
function downloadBinaryFile(
        url,
        errorMessage,
        button,
        loadingText){

    const originalHtml =
        button ? button.innerHTML : '';

    if(button){
        button.disabled = true;
        button.classList.add('loading');
        button.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin"></i>'
            + '<span>'
            + escapeHtml(loadingText || '생성 중...')
            + '</span>';
    }

    return fetch(url, {
        credentials:'same-origin'
    })
    .then(response => {
        if(!response.ok){
            throw new Error(errorMessage);
        }

        const disposition =
            response.headers.get('Content-Disposition') || '';
        const fileName =
            getDownloadFileName(disposition);

        return response.blob()
        .then(blob => ({
            blob:blob,
            fileName:fileName
        }));
    })
    .then(download => {
        const objectUrl =
            URL.createObjectURL(download.blob);
        const link =
            document.createElement('a');

        link.href = objectUrl;

        if(download.fileName){
            link.download = download.fileName;
        }

        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(objectUrl);
    })
    .catch(error => {
        alert(error.message || errorMessage);
    })
    .finally(() => {
        if(button){
            button.disabled = false;
            button.classList.remove('loading');
            button.innerHTML = originalHtml;
        }
    });
}

function getDownloadFileName(contentDisposition){
    const encodedMatch =
        contentDisposition.match(/filename\*=UTF-8''([^;]+)/i);

    if(encodedMatch){
        try{
            return decodeURIComponent(encodedMatch[1]);
        }catch(error){
            return encodedMatch[1];
        }
    }

    const quotedMatch =
        contentDisposition.match(/filename="([^"]+)"/i);

    if(quotedMatch){
        return quotedMatch[1];
    }

    return '';
}

function initializeCommentPanelResize(){

    const resizer =
        document.getElementById(
            'commentPanelResizer'
        );
    const panel =
        document.querySelector('.right-panel');
    const savedWidth =
        Number(localStorage.getItem(
            'commentPanelWidth'));

    if(savedWidth){
        panel.style.width = savedWidth + 'px';
    }

    resizer.addEventListener('mousedown', function(event){

        event.preventDefault();
        let resizeFrame = null;
        let pendingWidth = panel.offsetWidth;
        document.body.classList.add(
            'resizing-comment-panel'
        );

        function onMouseMove(moveEvent){

            const maximumWidth =
                Math.max(
                    300,
                    Math.min(
                        700,
                        window.innerWidth - 500
                    )
                );
            const width =
                Math.min(
                    Math.max(
                        window.innerWidth - moveEvent.clientX,
                        300
                    ),
                    maximumWidth
                );

            pendingWidth = width;

            if(resizeFrame === null){
                resizeFrame = requestAnimationFrame(function(){
                    panel.style.width = pendingWidth + 'px';
                    resizeFrame = null;
                });
            }
        }

        function onMouseUp(){

            document.removeEventListener(
                'mousemove',
                onMouseMove
            );
            document.removeEventListener(
                'mouseup',
                onMouseUp
            );
            document.body.classList.remove(
                'resizing-comment-panel'
            );

            if(resizeFrame !== null){
                cancelAnimationFrame(resizeFrame);
                resizeFrame = null;
            }

            panel.style.width = pendingWidth + 'px';
            localStorage.setItem(
                'commentPanelWidth',
                pendingWidth
            );
        }

        document.addEventListener(
            'mousemove',
            onMouseMove
        );
        document.addEventListener(
            'mouseup',
            onMouseUp
        );
    });
}

/*
 * 같은 PDF를 보고 있는 사용자와 댓글 편집 상태를 WebSocket으로 동기화한다.
 * WebSocket에는 댓글 본문 전체를 싣지 않고 COMMENT_CHANGED 신호만 전달한다.
 * 신호를 받은 화면은 loadComments()로 DB의 최신 내용을 다시 읽는다.
 */
function connectCollaboration(){

    if(!currentPdfId){
        return;
    }

    collaborationClosedByPage = false;

    if(collaborationReconnectTimer){
        clearTimeout(collaborationReconnectTimer);
        collaborationReconnectTimer = null;
    }

    if(collaborationSocket
            && collaborationSocket.readyState
            <= WebSocket.OPEN){
        return;
    }

    const protocol =
        window.location.protocol === 'https:'
        ? 'wss:'
        : 'ws:';

    const socket =
        new WebSocket(
            protocol
            + '//'
            + window.location.host
            + '/ws/pdf?pdfId='
            + currentPdfId
        );

    collaborationSocket = socket;

    socket.onmessage =
    function(message){

        if(socket !== collaborationSocket){
            return;
        }

        let event = null;

        try{
            event = JSON.parse(message.data);
        }catch(error){
            return;
        }

        if(event.type === 'COMMENT_CHANGED'){
            scheduleCommentReload();
        }

    };

    socket.onclose =
    function(){

        if(socket === collaborationSocket){
            collaborationSocket = null;
        }

        scheduleCollaborationReconnect();

    };

    socket.onerror =
    function(){
        if(socket.readyState === WebSocket.OPEN
                || socket.readyState === WebSocket.CONNECTING){
            socket.close();
        }
    };

}

// 탭이 보이는 동안만 2초 뒤 재연결해 백그라운드 탭의 불필요한 연결 반복을 막는다.
function scheduleCollaborationReconnect(){

    if(collaborationClosedByPage
            || document.hidden
            || collaborationReconnectTimer){
        return;
    }

    collaborationReconnectTimer =
        setTimeout(function(){
            collaborationReconnectTimer = null;
            connectCollaboration();
        }, 2000);
}

document.addEventListener(
    'visibilitychange',
    function(){
        if(!document.hidden
                && currentPdfId
                && (!collaborationSocket
                    || collaborationSocket.readyState
                    > WebSocket.OPEN)){
            connectCollaboration();
        }
    }
);

window.addEventListener(
    'beforeunload',
    function(){
        collaborationClosedByPage = true;

        if(collaborationReconnectTimer){
            clearTimeout(collaborationReconnectTimer);
            collaborationReconnectTimer = null;
        }

        if(collaborationSocket){
            collaborationSocket.close();
            collaborationSocket = null;
        }
    }
);

// 짧은 시간에 변경 신호가 여러 번 와도 댓글 API는 한 번만 호출한다.
function scheduleCommentReload(){

    const changeReceivedAt = Date.now();
    clearTimeout(commentReloadTimer);

    commentReloadTimer =
        setTimeout(function(){
            if(lastCommentLoadAt < changeReceivedAt){
                loadComments();
            }
        }, 120);
}

// 편집 시작/종료 상태를 같은 PDF 방에 보내 다른 사용자의 동시 편집을 표시한다.
function sendEditing(editing,commentId){

    if(!collaborationSocket
            || collaborationSocket.readyState
            !== WebSocket.OPEN){
        return;
    }

    try{
        collaborationSocket.send(
            JSON.stringify({
                type:editing
                    ? 'EDITING_START'
                    : 'EDITING_STOP',
                commentId:commentId
            })
        );
    }catch(error){
        collaborationSocket = null;
        scheduleCollaborationReconnect();
    }

}

function handleApiResponse(response){

    if(response.ok){
        return response.text();
    }

    return readApiError(response)
    .then(message => {
        throw new Error(
            message || 'Request failed.');
    });

}

function handleJsonResponse(response){

    if(response.ok){
        return response.json();
    }

    return readApiError(response)
    .then(message => {
        throw new Error(
            message || 'Request failed.');
    });
}

function readApiError(response){

    return response.text().then(text => {
        try{
            const body = JSON.parse(text);
            return body.message || body.error || text;
        }catch(error){
            return text;
        }
    });
}

function showApiError(error){

    alert(error.message);

}

// ESC 입력 시 작성 모드, 미리보기와 현재 코멘트 선택을 취소한다.
function handleAnnotationEscape(event){

    if(event.key !== 'Escape'){
        return;
    }

    if(commentMode === 'SELECT'
            && !selectedCommentData
            && !rectStartData
            && !drawingStartData
            && selectedCommentId === null){
        return;
    }

    consumeAnnotationShortcut(event);
    cancelPendingAnnotation();
    clearSelectedComment();
}

// 주석 단축키가 PDF.js의 검색, 회전 등 기본 단축키로 전달되지 않게 막는다.
function handleAnnotationShortcut(event){

    if(event.ctrlKey || event.metaKey || event.altKey){
        return;
    }

    const target = event.target;

    if(isTextEditingTarget(target)){
        return;
    }

    const key = event.key.toLowerCase();

    if(key === 't'){
        consumeAnnotationShortcut(event);
        activateHighlightTool();
        return;
    }

    if(key === 'r'){
        consumeAnnotationShortcut(event);
        setCommentMode('RECT');
        return;
    }

    if(key === 'c'){
        consumeAnnotationShortcut(event);
        setCommentMode('CALLOUT');
        return;
    }

    if(key === 'd'){
        consumeAnnotationShortcut(event);
        setCommentMode('DRAW');
    }
}

/*
 * PDF.js iframe의 텍스트 선택 영역을 페이지 기준 0~1 좌표로 변환한다.
 * 여러 줄 선택은 줄별 사각형을 drawingPath에 저장해 다시 그릴 때 빈 영역까지 칠하지 않는다.
 */
function getPdfTextSelection(viewerWindow){
    const selection = viewerWindow.getSelection();

    if(
        !selection
        || selection.rangeCount === 0
        || selection.toString().trim().length === 0
    ){
        return null;
    }

    const range = selection.getRangeAt(0);
    const startElement =
        range.startContainer.nodeType === 1
        ? range.startContainer
        : range.startContainer.parentElement;
    const pageElement =
        startElement && startElement.closest('.page');

    if(!pageElement){
        return null;
    }

    const pageRect = pageElement.getBoundingClientRect();
    let rects = [];

    try{
        rects =
            getSelectionLineRects(range, pageElement, pageRect);
    }catch(error){
        rects = [];
    }

    if(rects.length === 0){
        const fallbackRect =
            toNormalizedSelectionRect(
                range.getBoundingClientRect(),
                pageRect
            );

        if(fallbackRect){
            rects = [fallbackRect];
        }
    }

    if(rects.length === 0){
        return null;
    }

    const bounds =
        getRectBounds(rects);

    return {
        commentType:'TEXT',
        selectedText:selection.toString().trim(),
        pageNum:Number(pageElement.dataset.pageNumber),
        rectX:bounds.x,
        rectY:bounds.y,
        rectW:bounds.w,
        rectH:bounds.h,
        drawingPath:JSON.stringify({
            type:'text-highlight-rects',
            rects:rects
        })
    };
}

function getSelectionLineRects(range, pageElement, pageRect){
    const rawRects =
        Array.from(range.getClientRects())
        .filter(rect =>
            rect.width > 0
            && rect.height > 0
            && rect.bottom >= pageRect.top
            && rect.top <= pageRect.bottom
            && rect.right >= pageRect.left
            && rect.left <= pageRect.right
        )
        .map(rect => toNormalizedSelectionRect(rect, pageRect))
        .filter(Boolean);

    return mergeLineRects(rawRects);
}

function toNormalizedSelectionRect(rect, pageRect){
    if(
        !rect
        || !pageRect
        || pageRect.width <= 0
        || pageRect.height <= 0
    ){
        return null;
    }

    const x1 =
        clampRatio((rect.left - pageRect.left) / pageRect.width);
    const y1 =
        clampRatio((rect.top - pageRect.top) / pageRect.height);
    const x2 =
        clampRatio((rect.right - pageRect.left) / pageRect.width);
    const y2 =
        clampRatio((rect.bottom - pageRect.top) / pageRect.height);
    const width = x2 - x1;
    const height = y2 - y1;

    if(width <= 0 || height <= 0){
        return null;
    }

    return {
        x:x1,
        y:y1,
        w:width,
        h:height
    };
}

function clampRatio(value){
    if(!Number.isFinite(value)){
        return 0;
    }

    return Math.min(
        Math.max(value, 0),
        1
    );
}

// 같은 텍스트 줄에서 잘게 나뉜 브라우저 선택 사각형을 하나의 줄 영역으로 합친다.
function mergeLineRects(rects){
    const lineTolerance = 0.004;
    const lines = [];

    rects
    .sort((a,b) => a.y - b.y || a.x - b.x)
    .forEach(rect => {
        const rectCenterY =
            rect.y + (rect.h / 2);
        const line =
            lines.find(item =>
                {
                    const overlap =
                        Math.max(
                            0,
                            Math.min(
                                item.y + item.h,
                                rect.y + rect.h
                            )
                            - Math.max(item.y, rect.y)
                        );
                    const minimumHeight =
                        Math.min(item.h, rect.h);
                    const centerDistance =
                        Math.abs(
                            (item.y + (item.h / 2))
                            - rectCenterY
                        );

                    return (
                        minimumHeight > 0
                        && overlap / minimumHeight >= 0.55
                    )
                    || centerDistance
                        <= Math.max(
                            lineTolerance,
                            minimumHeight * 0.35
                        );
                }
            );

        if(!line){
            lines.push({...rect});
            return;
        }

        const x1 = Math.min(line.x, rect.x);
        const y1 = Math.min(line.y, rect.y);
        const x2 = Math.max(line.x + line.w, rect.x + rect.w);
        const y2 = Math.max(line.y + line.h, rect.y + rect.h);
        line.x = x1;
        line.y = y1;
        line.w = x2 - x1;
        line.h = y2 - y1;
    });

    return lines;
}

function getRectBounds(rects){
    const x1 = Math.min(...rects.map(rect => rect.x));
    const y1 = Math.min(...rects.map(rect => rect.y));
    const x2 = Math.max(...rects.map(rect => rect.x + rect.w));
    const y2 = Math.max(...rects.map(rect => rect.y + rect.h));

    return {
        x:x1,
        y:y1,
        w:x2 - x1,
        h:y2 - y1
    };
}

function activateHighlightTool(){
    const viewer =
        document.getElementById('pdfViewer');

    if(viewer.contentWindow){
        const selectionData =
            getPdfTextSelection(viewer.contentWindow);

        if(selectionData){
            pendingTextSelection = selectionData;
        }
    }

    if(
        pendingTextSelection
        && viewer.contentWindow
    ){
        applyPendingTextHighlight(viewer.contentWindow);
        return;
    }

    setCommentMode('HIGHLIGHT');
}

function applyPendingTextHighlight(viewerWindow){
    if(!pendingTextSelection){
        return false;
    }

    selectedCommentData = pendingTextSelection;
    pendingTextSelection = null;
    drawSelectedCommentPreview(selectedCommentData);

    const selection = viewerWindow.getSelection();

    if(selection){
        selection.removeAllRanges();
    }

    resetCommentMode();
    saveHighlightedTextComment(selectedCommentData);
    return true;
}

// 텍스트 선택 좌표를 빈 본문의 댓글로 먼저 저장한 뒤 오른쪽 편집칸을 연다.
function saveHighlightedTextComment(highlightData){
    if(
        !highlightData
        || !currentPdfId
        || highlightSaveInProgress
    ){
        return;
    }

    highlightSaveInProgress = true;

    fetch('/api/comment/add', {
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            pdfId:currentPdfId,
            pageNum:highlightData.pageNum,
            posX:highlightData.rectX,
            posY:highlightData.rectY,
            commentText:'',
            status:'OPEN',
            commentType:'TEXT',
            selectedText:highlightData.selectedText,
            rectX:highlightData.rectX,
            rectY:highlightData.rectY,
            rectW:highlightData.rectW,
            rectH:highlightData.rectH,
            drawingPath:highlightData.drawingPath || null
        })
    })
    .then(handleJsonResponse)
    .then(commentId => {
        selectedCommentData = null;
        currentCommentFilter = 'ALL';
        document.getElementById(
            'commentStatusFilter'
        ).value = 'ALL';
        document.getElementById(
            'commentSearch'
        ).value = '';
        document.getElementById(
            'commentIdSearch'
        ).value = '';

        return loadComments().then(() => {
            focusCreatedAnnotationComment(commentId);
        });
    })
    .catch(error => {
        selectedCommentData = null;
        drawHighlights(loadedComments);
        showApiError(error);
    })
    .finally(() => {
        highlightSaveInProgress = false;
    });
}

// 사각형, 말풍선, 자유 그리기 좌표를 댓글 데이터로 저장한다.

    if(

function consumeAnnotationShortcut(event){
    event.preventDefault();
    event.stopPropagation();

    if(typeof event.stopImmediatePropagation === 'function'){
        event.stopImmediatePropagation();
    }
}

function cancelPendingAnnotation(){

    selectedCommentData = null;
    pendingTextSelection = null;
    rectStartData = null;
    drawingStartData = null;

    const viewer =
        document.getElementById('pdfViewer');

    if(viewer.contentWindow){
        viewer.contentWindow.document
            .querySelectorAll('.pdf-comment-preview')
            .forEach(element => element.remove());

        const selection =
            viewer.contentWindow.getSelection();

        if(selection){
            selection.removeAllRanges();
        }
    }

    resetCommentMode();
}

document.addEventListener(
    'keydown',
    handleAnnotationEscape,
    true
);
document.addEventListener(
    'keydown',
    handleAnnotationShortcut,
    true
);
document.addEventListener(
    'keydown',
    handleSelectedCommentDelete,
    true
);

function setCommentMode(mode){

    commentMode = mode;
    rectStartData = null;
    drawingStartData = null;
    selectedCommentData = null;

    if(mode !== 'HIGHLIGHT'){
        pendingTextSelection = null;
    }

    const viewer =
        document.getElementById('pdfViewer');

    if(viewer.contentWindow){
        viewer.contentWindow.document
            .querySelectorAll('.pdf-comment-preview')
            .forEach(e => e.remove());
    }

    updatePdfAnnotationToolbar();

}

/*
 * PDF.js iframe 툴바에 MAOOM 전용 선택/텍스트/사각형/말풍선/그리기 버튼을 추가한다.
 * PDF.js 배포 파일 자체를 크게 수정하지 않고 부모 화면에서 필요한 UI와 이벤트를 주입한다.
 */
function initializePdfAnnotationToolbar(viewerWindow){

    const viewerDocument = viewerWindow.document;
    const toolbarRight =

    if(!toolbarRight
            || viewerDocument
                .getElementById('maoomAnnotationTools')){

    }

        }
        #maoomAnnotationTools {
            display:flex;
            align-items:center;
            gap:1px;
            margin-inline-end:4px;
            padding-inline-end:7px;
            border-inline-end:1px solid
                var(--toolbar-separator-color, #c8c8c8);
        }

            height:32px;
            padding:0;
            border:0;

        }

            background:var(--button-hover-color, rgba(0,0,0,.08));
        }
        .maoom-annotation-button.active {
            color:#1473e6;
            background:rgba(20,115,230,.10);
        }
        .maoom-annotation-button.active::after {
            content:"";
            position:absolute;
            right:5px;
            bottom:1px;
            left:5px;
            height:2px;
            border-radius:2px;
            background:#1473e6;
        }
        .maoom-annotation-button[data-mode="CALLOUT"] {
            color:#e11d2e;
        }
        .maoom-annotation-button[data-mode="CALLOUT"].active {

            background:rgba(225,29,46,.12);
        }
        .maoom-annotation-button[data-mode="CALLOUT"].active::after {
            background:#e11d2e;
        }
        .maoom-annotation-button svg {
            width:20px;
            height:20px;
            fill:none;
            stroke:currentColor;
            stroke-width:1.8;
            stroke-linecap:round;
            stroke-linejoin:round;
        }
        html.maoom-mode-rect #viewerContainer,
        html.maoom-mode-rect #viewerContainer * {

        }
        html.maoom-mode-callout #viewerContainer,
        html.maoom-mode-callout #viewerContainer * {

        }
        html.maoom-mode-draw #viewerContainer,
        html.maoom-mode-draw #viewerContainer * {

        .pdf-comment-hover-popup {

    tools.setAttribute('aria-label', '코멘트 주석 도구');

    [
        {
            mode:'HIGHLIGHT',
            title:'텍스트 강조 (T)',
            icon:'<path d="M5 16l9-9 3 3-9 9H5v-3z"></path><path d="M4 21h16"></path>'
        },
        {
            mode:'RECT',
            title:'사각형 (R)',
            icon:'<rect x="4" y="5" width="16" height="14"></rect>'
        },
        {
            mode:'CALLOUT',
            title:'말풍선 (C)',
            icon:'<path d="M4 5h16v11H9l-5 4V5z"></path>'
        },
        {
            mode:'DRAW',
            title:'자유 그리기 (D)',
            icon:'<path d="M4 20l2-5L17 4l3 3L9 18l-5 2z"></path><path d="M14.5 6.5l3 3"></path>'
        }
    ].forEach(tool => {
        const button = viewerDocument.createElement('button');
        button.type = 'button';
        button.className = 'maoom-annotation-button';
        button.dataset.mode = tool.mode;
        button.title = tool.title;
        button.setAttribute('aria-label', tool.title);
        button.setAttribute('aria-pressed', 'false');
        button.innerHTML =
            '<svg viewBox="0 0 24 24" aria-hidden="true">'
            + tool.icon
            + '</svg>';
        button.addEventListener(
            'click',
            () => {
                if(tool.mode === 'HIGHLIGHT'){
                    activateHighlightTool();
                    return;
                }
                setCommentMode(tool.mode);
            }
        );
        tools.appendChild(button);
    });

    toolbarRight.prepend(tools);
    updatePdfAnnotationToolbar();
}

function updatePdfAnnotationToolbar(){

    const viewerWindow =
        document.getElementById('pdfViewer').contentWindow;

    if(!viewerWindow){
        return;
    }

    viewerWindow.document
        .querySelectorAll('.maoom-annotation-button')
        .forEach(button => {
            const active =
                button.dataset.mode === commentMode;
            button.classList.toggle('active', active);
            button.setAttribute(
                'aria-pressed',
                String(active)
            );
        });

    const root =
        viewerWindow.document.documentElement;

    root.classList.remove(
        'maoom-mode-highlight',
        'maoom-mode-rect',
        'maoom-mode-callout',
        'maoom-mode-draw'
    );

    if(commentMode === 'HIGHLIGHT'){
        root.classList.add('maoom-mode-highlight');
    }else if(commentMode === 'RECT'){
        root.classList.add('maoom-mode-rect');
    }else if(commentMode === 'CALLOUT'){
        root.classList.add('maoom-mode-callout');
    }else if(commentMode === 'DRAW'){
        root.classList.add('maoom-mode-draw');
    }
}

function resetCommentMode(){

    commentMode = 'SELECT';
    rectStartData = null;
    drawingStartData = null;

    updatePdfAnnotationToolbar();

}
