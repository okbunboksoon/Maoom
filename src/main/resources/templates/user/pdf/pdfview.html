<!DOCTYPE html>
<!--
    PDF 리뷰 메인 화면의 연결 흐름

    1. URL의 Drive fileId를 /api/pdf/find-by-drive-file-id로 보내 내부 pdfId를 얻는다.
    2. 가운데 iframe은 PDF.js를 열고 /api/drive/pdf에서 원본 PDF를 읽는다.
    3. 오른쪽 패널은 /api/comment/* REST API로 댓글·답글·첨부를 조회하고 저장한다.
    4. 주석 좌표는 페이지 크기 기준 0~1 비율로 저장해 확대 배율과 무관하게 다시 그린다.
    5. /ws/pdf WebSocket은 변경 사실만 알리고, 화면은 REST API로 최신 데이터를 재조회한다.
    6. 내보내기 버튼은 CommentExportService 또는 CommentPdfExportService와 연결된다.

    이 파일은 화면 상태와 사용자 조작을 담당한다. DB 규칙과 권한 검사는 Java 서비스가 담당한다.
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/user/css/PdfView.css?v=annotation-highlight-fix-4">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://kit.fontawesome.com/51db22a717.js" crossorigin="anonymous"></script>
	<link href="https://fonts.googleapis.com/css2?family=Alata&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

	<div class="left-panel">
	    <div class="pdf-tree-header">
	        <div>
	            <h3>PDF리뷰</h3>
	            <p>PDF 문서 탐색</p>
	        </div>
	        <span class="pdf-tree-badge">Drive</span>
	    </div>
	    <ul id="folderTree">
	        <li class="viewer-tree-loading">PDF 목록을 불러오는 중입니다.</li>
	    </ul>
	</div>
	
	<div class="center-panel">

	    <input type="hidden"
	           id="fileId"
	           th:value="${fileId}">

	    <iframe id="pdfViewer">
			
		</iframe>

	</div>

    <div id="commentPanelResizer"
         class="comment-panel-resizer"
         title="드래그하여 댓글 패널 너비 조절"></div>

    <div class="right-panel">

        <div class="comment-panel-header">
            <div>
                <h3>주석</h3>
                <div id="currentUserInfo"></div>
            </div>
            <div class="comment-header-icons">
                <button type="button"
                        id="pdfExportBtn"
                        class="export-btn pdf-export-btn"
                        title="코멘트 포함 PDF 내보내기"
                        onclick="downloadCurrentPdf(this)">
                    <span class="export-file-icon" aria-hidden="true">PDF</span>
                    <span>PDF</span>
                </button>
                <button type="button"
                        class="export-btn excel-export-btn"
                        title="댓글 Excel 내보내기"
                        onclick="exportCommentsToExcel()">
                    <span class="export-file-icon" aria-hidden="true">X</span>
                    <span>Excel</span>
                </button>
            </div>
        </div>

        <div class="comment-utility">
            <div class="comment-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="commentSearch"
                       type="search"
                       placeholder="댓글 또는 작성자 검색">
            </div>
            <div class="comment-search-wrap comment-id-search-wrap">
                <i class="fa-solid fa-hashtag"></i>
                <input id="commentIdSearch"
                       type="text"
                       inputmode="numeric"
                       pattern="[0-9]*"
                       autocomplete="off"
                       placeholder="코멘트 ID 검색">
            </div>
            <div class="comment-navigation">
                <button type="button"
                        onclick="navigateUnresolved(-1)">이전 미해결</button>
                <button type="button"
                        onclick="navigateUnresolved(1)">다음 미해결</button>
                <button id="toggleAllCommentsBtn"
                        type="button"
                        onclick="toggleAllComments()">전체 접기</button>
            </div>
        </div>

		<div class="comment-toolbar">
            <label class="comment-status-field"
                   for="commentStatusFilter">
                <span>표시할 코멘트</span>
                <select id="commentStatusFilter">
                    <option value="ALL">전체</option>
                    <option value="OPEN">미해결</option>
                    <option value="RESOLVED">해결됨</option>
                </select>
            </label>
		</div>

        <div id="commentList"></div>

        <div id="commentComposer"
             class="comment-composer">
            <textarea id="commentText"
                      rows="2"
                      placeholder="주석을 달거나 @을 사용하여 다른 사람을 멘션하세요."></textarea>

            <div class="comment-composer-footer">
                <div class="attachment-composer">
                    <label for="commentAttachments"
                           class="attachment-select-btn">
                        <i class="fa-solid fa-paperclip"></i>
                        파일/이미지 첨부
                    </label>
                    <input id="commentAttachments"
                           type="file"
                           multiple>
                </div>
                <button id="commentBtn">게시</button>
            </div>

            <div id="selectedAttachmentList"></div>

            <div class="attachment-drop-hint">
                이미지 또는 파일을 이 영역에 끌어 놓아도 첨부됩니다.
            </div>
        </div>

    </div>

</div>

<div id="mentionAutocomplete"
     class="mention-autocomplete"
     role="listbox"></div>

<div id="attachmentImagePreview"
     class="attachment-image-preview"
     aria-hidden="true">
    <img alt="">
</div>

<script>
    /*
     * 화면 전체에서 공유하는 상태.
     * currentPdfId는 댓글 API의 기준 ID이고, fileId는 Drive 원본 파일 조회용 ID다.
     * 좌표 작성 상태와 첨부 대기 목록은 서버에 저장되기 전까지만 브라우저에 보관한다.
     */
	let selectedCommentId = null;
	let currentPdfId = null;
	let selectedCommentData = null;
	let commentMode = 'SELECT';
	let pendingTextSelection = null;
	let highlightSaveInProgress = false;
	let annotationSaveInProgress = false;
	const commentSaveInProgress = new Set();
	const commentBlurActions = new Map();
	const replySaveInProgress = new Set();
	const replyBlurActions = new Map();
	let rectStartData = null;
	let drawingStartData = null;
	let currentUser = null;
	let mentionUsers = [];
	let mentionState = null;
	let currentCommentFilter = 'ALL';
	let commentSearchTimer = null;
	let pendingAttachments = [];
	const pendingReplyAttachments = new Map();
	const pendingCommentEditAttachments = new Map();
	const pendingReplyEditAttachments = new Map();
	let collaborationSocket = null;
    let collaborationReconnectTimer = null;
    let collaborationClosedByPage = false;
	let commentRequestController = null;
	let commentReloadTimer = null;
	let highlightRedrawTimer = null;
    let highlightRedrawFull = false;
    const highlightRedrawPages = new Set();
	let lastCommentLoadAt = 0;
	let loadedComments = [];
	const ROOT_FOLDER_ID = '18WFt3vOuVQarQQDiZVP2Y2WeyoXgk1Qb';
	const DRIVE_CACHE_DURATION = 5 * 60 * 1000;
	const DRIVE_CACHE_PREFIX = 'driveItems:' + ROOT_FOLDER_ID + ':';
	const OPENED_FOLDERS_KEY = 'openedFolders:' + ROOT_FOLDER_ID;
	const driveItemCache = new Map();
	const driveItemRequests = new Map();
	let openedFolders =
	    JSON.parse(sessionStorage.getItem(OPENED_FOLDERS_KEY) || '[]');
	let collapsedCommentIds =
	    JSON.parse(
	        sessionStorage.getItem(
	            'collapsedCommentIds'
	        ) || '[]'
	    ).map(String);

const fileId =
document.getElementById("fileId").value;

/*
 * 화면 초기화 순서:
 * Drive fileId를 내부 pdfId로 연결하고 로그인 사용자를 확인한 뒤
 * 댓글 목록과 같은 PDF 사용자의 WebSocket 연결을 시작한다.
 */
Promise.all([
    fetch(
        '/api/pdf/find-by-drive-file-id?fileId='
        + encodeURIComponent(fileId)
    ).then(handleJsonResponse),
    fetch('/api/user/me').then(handleJsonResponse)
])
.then(([pdf, user]) => {
    currentPdfId = pdf.pdfId;
    currentUser = user;

    document.getElementById(
        'currentUserInfo'
    ).textContent =
        user.userName + ' (' + user.userId + ')';

    loadComments();
    connectCollaboration();
})
.catch(showApiError);

fetch('/api/user/mention-list')
.then(response => response.json())
.then(users => {

    mentionUsers = users;

});

document.getElementById('pdfViewer').src =
/*
 * PDF.js에는 서버 API 주소를 file 파라미터로 전달한다.
 * PDF.js가 Range 요청을 보내면 DriveController가 캐시된 PDF의 해당 구간을 반환한다.
 */
'/pdfjs/web/viewer.html?file=' +
encodeURIComponent(
    window.location.origin +
    '/api/drive/pdf?fileId=' +
    fileId
) +
'#zoom=page-fit&spread=none';


document.getElementById('pdfViewer').onload = function(){

    const viewerWindow =
        this.contentWindow;

    const app =
        viewerWindow.PDFViewerApplication;
    let defaultPdfViewApplied = false;

    function applyDefaultPdfView(){
        const pdfViewer =
            app.pdfViewer;

        if(defaultPdfViewApplied || !pdfViewer){
            return;
        }

        defaultPdfViewApplied = true;
        pdfViewer.scrollMode = 3;
        pdfViewer.spreadMode = 0;
        pdfViewer.currentScaleValue = 'page-fit';
    }

    initializePdfAnnotationToolbar(viewerWindow);

    viewerWindow.addEventListener(
        'keydown',
        handleAnnotationEscape,
        true
    );
    viewerWindow.addEventListener(
        'keydown',
        handleAnnotationShortcut,
        true
    );
    viewerWindow.addEventListener(
        'keydown',
        handleSelectedCommentDelete,
        true
    );

    viewerWindow.document.addEventListener(
        'wheel',
        function(e){

            const pdfViewer =
                app.pdfViewer;
            const pageScrollMode = 3;

            // PDF.js의 페이지 단위 모드에서만 휠로 페이지를 전환한다.
            // 세로/가로/연속 모드에서는 기본 스크롤을 막지 않는다.
            if(
                !pdfViewer
                || pdfViewer.scrollMode !== pageScrollMode
                || e.ctrlKey
                || e.metaKey
                || app.page === undefined
            ){
                return;
            }

            e.preventDefault();

            if(e.deltaY > 0){

                if(app.page < app.pagesCount){
                    app.page++;
                }

            }else{

                if(app.page > 1){
                    app.page--;
                }

            }

        },
        { passive:false }
    );
	
	viewerWindow.document.addEventListener(
	    'mouseup',
	    function(){

	        if(
	            commentMode !== 'HIGHLIGHT'
	            && commentMode !== 'SELECT'
	        ){
	            return;
	        }

	        const selectionData =
	            getPdfTextSelection(viewerWindow);

	        if(!selectionData){
	            return;
	        }

	        pendingTextSelection = selectionData;

	        if(commentMode === 'HIGHLIGHT'){
	            applyPendingTextHighlight(viewerWindow);
	        }

	    }
	);

	viewerWindow.document.addEventListener(
	    'mousedown',
	    function(e){
	        if(
	            commentMode === 'SELECT'
	            && e.target.closest('.page')
	        ){
	            pendingTextSelection = null;
	        }
	    }
	);
	
	viewerWindow.document.addEventListener(
	    'mousedown',
	    function(e){

	        if(commentMode !== 'RECT'){
	            return;
	        }

	        e.preventDefault();

	        const page =
	            e.target.closest('.page');

	        if(!page){
	            return;
	        }

	        const pageRect =
	            page.getBoundingClientRect();

	        const preview =
	            viewerWindow.document.createElement('div');
	        preview.className =
	            'pdf-comment-preview pdf-rect-drawing-preview';
	        preview.style.position = 'absolute';
	        preview.style.left =
	            (e.clientX - pageRect.left) + 'px';
	        preview.style.top =
	            (e.clientY - pageRect.top) + 'px';
	        preview.style.width = '0';
	        preview.style.height = '0';
	        preview.style.boxSizing = 'border-box';
	        preview.style.border = '3px solid #ff1f1f';
	        preview.style.background = 'rgba(255,31,31,.06)';
	        preview.style.pointerEvents = 'none';
	        preview.style.zIndex = '1001';
	        page.appendChild(preview);

	        rectStartData = {
	            pageNum : Number(page.dataset.pageNumber),
	            page : page,
	            preview : preview,
	            x : e.clientX - pageRect.left,
	            y : e.clientY - pageRect.top,
	            width : pageRect.width,
	            height : pageRect.height
	        };

	    }
	);

	viewerWindow.document.addEventListener(
	    'mousemove',
	    function(e){

	        if(commentMode !== 'RECT' || !rectStartData){
	            return;
	        }

	        const pageRect =
	            rectStartData.page.getBoundingClientRect();
	        const endX = Math.min(
	            Math.max(e.clientX - pageRect.left, 0),
	            pageRect.width
	        );
	        const endY = Math.min(
	            Math.max(e.clientY - pageRect.top, 0),
	            pageRect.height
	        );

	        rectStartData.preview.style.left =
	            Math.min(rectStartData.x, endX) + 'px';
	        rectStartData.preview.style.top =
	            Math.min(rectStartData.y, endY) + 'px';
	        rectStartData.preview.style.width =
	            Math.abs(endX - rectStartData.x) + 'px';
	        rectStartData.preview.style.height =
	            Math.abs(endY - rectStartData.y) + 'px';
	    }
	);
	
	viewerWindow.document.addEventListener(
	    'mouseup',
	    function(e){

	        if(commentMode !== 'RECT'){
	            return;
	        }

	        if(!rectStartData){
	            return;
	        }

	        const page = rectStartData.page;

	        const pageRect =
	            page.getBoundingClientRect();

	        const endX =
	            Math.min(
	                Math.max(e.clientX - pageRect.left, 0),
	                pageRect.width
	            );

	        const endY =
	            Math.min(
	                Math.max(e.clientY - pageRect.top, 0),
	                pageRect.height
	            );

	        const rectWidth =
	            Math.abs(endX - rectStartData.x);
	        const rectHeight =
	            Math.abs(endY - rectStartData.y);

	        rectStartData.preview.remove();

	        if(rectWidth < 4 || rectHeight < 4){
	            rectStartData = null;
	            return;
	        }

	        selectedCommentData = {
	            commentType : 'RECT',
	            selectedText : null,
	            pageNum : rectStartData.pageNum,
	            rectX : Math.min(rectStartData.x,endX) / pageRect.width,
	            rectY : Math.min(rectStartData.y,endY) / pageRect.height,
	            rectW : rectWidth / pageRect.width,
	            rectH : rectHeight / pageRect.height
	        };

	        rectStartData = null;

	        drawSelectedCommentPreview(selectedCommentData);
	        resetCommentMode();
	        saveVisualAnnotationComment(selectedCommentData);

	    }
	);
	
	viewerWindow.document.addEventListener(
	    'click',
	    function(e){

	        if(commentMode !== 'CALLOUT'){
	            return;
	        }

	        if(e.target.closest('.pdf-comment-highlight')){
	            return;
	        }

	        const page =
	            e.target.closest('.page');

	        if(!page){
	            return;
	        }

	        const pageRect =
	            page.getBoundingClientRect();

	        selectedCommentData = {

	            commentType : 'CALLOUT',

	            pageNum :
	                Number(page.dataset.pageNumber),

	            rectX :
	                (e.clientX - pageRect.left)
	                / pageRect.width,

	            rectY :
	                (e.clientY - pageRect.top)
	                / pageRect.height,

	            rectW : 0,
	            rectH : 0,
	            selectedText : null
	        };

	        drawSelectedCommentPreview(selectedCommentData);
	        resetCommentMode();
	        saveVisualAnnotationComment(selectedCommentData);

	    }
	);

	viewerWindow.document.addEventListener(
	    'mousedown',
	    function(e){

	        if(commentMode !== 'DRAW' || e.button !== 0){
	            return;
	        }

	        const page = e.target.closest('.page');

	        if(!page){
	            return;
	        }

	        e.preventDefault();

	        const pageRect = page.getBoundingClientRect();
	        const svg = createDrawingSvg(
	            viewerWindow.document,
	            'pdf-comment-preview pdf-drawing-preview'
	        );
	        const path = createDrawingPath(
	            viewerWindow.document
	        );
	        svg.appendChild(path);
	        page.appendChild(svg);

	        drawingStartData = {
	            page:page,
	            pageNum:Number(page.dataset.pageNumber),
	            width:pageRect.width,
	            height:pageRect.height,
	            points:[{
	                x:(e.clientX - pageRect.left) / pageRect.width,
	                y:(e.clientY - pageRect.top) / pageRect.height
	            }],
	            svg:svg,
	            path:path
	        };
	    }
	);

	viewerWindow.document.addEventListener(
	    'mousemove',
	    function(e){

	        if(commentMode !== 'DRAW' || !drawingStartData){
	            return;
	        }

	        const pageRect =
	            drawingStartData.page.getBoundingClientRect();
	        const point = {
	            x:Math.min(
	                Math.max(
	                    (e.clientX - pageRect.left)
	                    / pageRect.width,
	                    0
	                ),
	                1
	            ),
	            y:Math.min(
	                Math.max(
	                    (e.clientY - pageRect.top)
	                    / pageRect.height,
	                    0
	                ),
	                1
	            )
	        };

	        const previous =
	            drawingStartData.points[
	                drawingStartData.points.length - 1
	            ];

	        if(Math.hypot(
	                point.x - previous.x,
	                point.y - previous.y
	        ) < 0.0015){
	            return;
	        }

	        drawingStartData.points.push(point);
	        drawingStartData.path.setAttribute(
	            'd',
	            buildDrawingPath(drawingStartData.points)
	        );
	    }
	);

	viewerWindow.document.addEventListener(
	    'mouseup',
	    function(){

	        if(commentMode !== 'DRAW' || !drawingStartData){
	            return;
	        }

	        const drawing = drawingStartData;
	        drawingStartData = null;
	        drawing.svg.remove();

	        if(drawing.points.length < 2){
	            return;
	        }

	        const bounds = getDrawingBounds(drawing.points);

	        selectedCommentData = {
	            commentType:'DRAW',
	            selectedText:null,
	            pageNum:drawing.pageNum,
	            rectX:bounds.x,
	            rectY:bounds.y,
	            rectW:bounds.w,
	            rectH:bounds.h,
	            drawingPath:JSON.stringify(drawing.points)
	        };

	        drawSelectedCommentPreview(selectedCommentData);
	        resetCommentMode();
	        saveVisualAnnotationComment(selectedCommentData);
	    }
	);
	
	viewerWindow.PDFViewerApplication.eventBus.on(
	    'pagesinit',
	    applyDefaultPdfView
	);

	viewerWindow.PDFViewerApplication.eventBus.on(
	    'pagesloaded',
	    function(){
	        applyDefaultPdfView();
	        scheduleHighlightRedraw(40);
	    }
	);

	viewerWindow.PDFViewerApplication.eventBus.on(
	    'pagerendered',
	    function(event){
	        scheduleHighlightRedraw(20, event.pageNumber);
	    }
	);

	[
	    'scalechanging',
	    'scalechanged'
	].forEach(eventName => {
	    viewerWindow.PDFViewerApplication.eventBus.on(
	        eventName,
	        function(){
	            scheduleHighlightRedraw(420);
	        }
	    );
	});
	};

let currentPathIds = [];

setTimeout(loadViewerDriveTree, 900);

// 현재 PDF 표시를 먼저 시작한 뒤 왼쪽 Drive 트리를 늦게 불러온다.
function loadViewerDriveTree(){
    fetch(
        '/api/drive/path?fileId='
        + encodeURIComponent(fileId)
    )
    .then(handleDriveResponse)
    .then(pathList => {
	    currentPathIds = pathList.map(item => item.id);
        loadTree(
            ROOT_FOLDER_ID,
            document.getElementById('folderTree')
        );
    })
    .catch(error =>
        showViewerTreeError(
            error,
            document.getElementById('folderTree')
        )
    );
}

// 폴더별 응답을 재사용해 자동 펼침과 수동 재확장에서 중복 호출을 막는다.
function getDriveItems(folderId){

    const memoryCache = driveItemCache.get(folderId);

    if(
        memoryCache
        && Date.now() - memoryCache.savedAt < DRIVE_CACHE_DURATION
    ){
        return Promise.resolve(memoryCache.items);
    }

    const storageKey = DRIVE_CACHE_PREFIX + folderId;

    try{
        const storedCache =
            JSON.parse(sessionStorage.getItem(storageKey));

        if(
            storedCache
            && Date.now() - storedCache.savedAt < DRIVE_CACHE_DURATION
        ){
            driveItemCache.set(folderId, storedCache);
            return Promise.resolve(storedCache.items);
        }
    }catch(error){
        sessionStorage.removeItem(storageKey);
    }

    if(driveItemRequests.has(folderId)){
        return driveItemRequests.get(folderId);
    }

    const request =
        fetch(
            '/api/drive/items?folderId='
            + encodeURIComponent(folderId)
        )
        .then(handleDriveResponse)
        .then(items => {
            const cachedValue = {
                items,
                savedAt : Date.now()
            };

            driveItemCache.set(folderId, cachedValue);

            try{
                sessionStorage.setItem(
                    storageKey,
                    JSON.stringify(cachedValue)
                );
            }catch(error){
                // 저장 공간이 부족해도 메모리 캐시는 계속 사용한다.
            }

            return items;
        })
        .finally(() => driveItemRequests.delete(folderId));

    driveItemRequests.set(folderId, request);
    return request;
}

// 왼쪽 탐색기에 Google Drive 폴더와 PDF 트리를 구성한다.
function loadTree(folderId, parentElement){

    getDriveItems(folderId)
    .then(items =>
        renderViewerTree(
            folderId,
            parentElement,
            items
        )
    )
    .catch(error =>
        showViewerTreeError(error, parentElement)
    );
}

// 트리 항목을 메모리에서 만든 뒤 한 번에 화면에 반영한다.
function renderViewerTree(folderId, parentElement, items){

    const fragment = document.createDocumentFragment();
    const folders = items.filter(item => item.type === 'folder');
    const pdfs = items.filter(item => item.type === 'pdf');

    folders.forEach(folder => {
        const li = document.createElement('li');
        const toggle = document.createElement('button');
        const shouldExpand =
            currentPathIds.includes(folder.id)
            || openedFolders.includes(folder.id);

        toggle.type = 'button';
        toggle.className = 'viewer-folder-toggle';
        toggle.textContent = folder.name;
        li.appendChild(toggle);

        toggle.addEventListener('click', function(){
            const childTree = li.querySelector(':scope > ul');

            if(childTree){
                childTree.remove();
                toggle.classList.remove('expanded');
                openedFolders =
                    openedFolders.filter(
                        id => id !== folder.id
                    );
                saveOpenedFolders();
                return;
            }

            toggle.classList.add('expanded');
            rememberOpenedFolder(folder.id);

            const childUl = createViewerLoadingTree();
            li.appendChild(childUl);
            loadTree(folder.id, childUl);
        });

        if(shouldExpand){
            toggle.classList.add('expanded');
            rememberOpenedFolder(folder.id);

            const childUl = createViewerLoadingTree();
            li.appendChild(childUl);
            loadTree(folder.id, childUl);
        }

        fragment.appendChild(li);
    });

    drawPdfList(folderId, fragment, pdfs);

    if(folders.length === 0 && pdfs.length === 0){
        const emptyItem = document.createElement('li');
        emptyItem.className = 'viewer-tree-empty';
        emptyItem.textContent = '이 폴더에는 PDF가 없습니다.';
        fragment.appendChild(emptyItem);
    }

    parentElement.replaceChildren(fragment);
}

function addPendingAttachments(files){

    files.forEach(file => {

        const duplicate =
            pendingAttachments.some(savedFile =>
                savedFile.name === file.name
                && savedFile.size === file.size
                && savedFile.lastModified === file.lastModified);

        if(!duplicate){
            pendingAttachments.push(file);
        }
    });

    renderPendingAttachments();
}

function initializeAttachmentDrop(){

    const composer =
        document.getElementById('commentComposer');
    let dragDepth = 0;

    composer.addEventListener('dragenter', function(event){
        event.preventDefault();
        dragDepth++;
        composer.classList.add('attachment-drag-over');
    });

    composer.addEventListener('dragover', function(event){
        event.preventDefault();
        event.dataTransfer.dropEffect = 'copy';
    });

    composer.addEventListener('dragleave', function(event){
        event.preventDefault();
        dragDepth--;

        if(dragDepth <= 0){
            dragDepth = 0;
            composer.classList.remove('attachment-drag-over');
        }
    });

    composer.addEventListener('drop', function(event){
        event.preventDefault();
        dragDepth = 0;
        composer.classList.remove('attachment-drag-over');

        addPendingAttachments(
            [...event.dataTransfer.files]
        );
    });
}

// 현재 PDF의 댓글을 상태별로 조회하여 오른쪽 패널에 다시 그린다.
function loadComments(){

    if(!currentPdfId){
        return Promise.resolve();
    }

    if(commentRequestController){
        commentRequestController.abort();
    }

    const requestController = new AbortController();
    commentRequestController = requestController;

    return fetch(
        '/api/comment/list?pdfId='
        + currentPdfId
        + '&status='
        + encodeURIComponent(currentCommentFilter),
        {
            signal:requestController.signal
        }
    )
    .then(handleJsonResponse)
    .then(comments => {
        if(commentRequestController !== requestController){
            return;
        }

        loadedComments = comments;
        lastCommentLoadAt = Date.now();
        renderComments({
            redrawHighlights:true
        });
    })
    .catch(error => {
        if(error.name !== 'AbortError'){
            showApiError(error);
        }
    })
    .finally(() => {
        if(commentRequestController === requestController){
            commentRequestController = null;
        }
    });
}

// 검색어 변경은 이미 받은 댓글 데이터만 다시 필터링해 불필요한 API 호출을 막는다.
function renderComments(options = {}){

        const comments = loadedComments;

        if(options.redrawHighlights){
            drawHighlights(comments);
        }

        const searchQuery =
            document.getElementById('commentSearch')
            .value
            .trim()
            .toLowerCase();
        const commentIdQuery =
            document.getElementById('commentIdSearch')
            .value
            .trim();

        const visibleComments =
            comments.filter(comment => {
                const matchesText =
                    !searchQuery
                    || String(comment.commentText || '')
                        .toLowerCase()
                        .includes(searchQuery)
                    || String(comment.userId || '')
                        .toLowerCase()
                        .includes(searchQuery)
                    || String(comment.userName || '')
                        .toLowerCase()
                        .includes(searchQuery);
                const commentNumber =
                    String(comment.commentCode || '')
                    .replace(/\D/g, '');
                const normalizedIdQuery =
                    commentIdQuery
                    ? commentIdQuery.padStart(4, '0')
                    : '';
                const matchesCommentId =
                    !commentIdQuery
                    || commentNumber === normalizedIdQuery;

                return matchesText && matchesCommentId;
            });

        let html = '';
        let lastPageNum = null;

        const orderedComments =
            [...visibleComments].sort((first, second) =>
                first.pageNum - second.pageNum
                || new Date(second.createDt)
                    - new Date(first.createDt));

        const pageCommentCounts =
            orderedComments.reduce((counts, comment) => {

                counts[comment.pageNum] =
                    (counts[comment.pageNum] || 0) + 1;

                return counts;

            }, {});

        orderedComments.forEach(comment => {

            if(lastPageNum !== comment.pageNum){

                if(lastPageNum !== null){
                    html += '</section>';
                }

                html +=
                    '<section class="comment-group">'
                    + '<div class="comment-page-header">'
                    + '<span>' + comment.pageNum + '페이지</span>'
                    + '<span class="page-comment-count">'
                    + pageCommentCounts[comment.pageNum]
                    + '</span>'
                    + '</div>';

                lastPageNum = comment.pageNum;
            }

            const statusAction =
                comment.status === 'RESOLVED'
                ? 'OPEN'
                : 'RESOLVED';

            const statusLabel =
                comment.status === 'RESOLVED'
                ? '재오픈'
                : '해결';

            let ownerActions = '';

            if(isOwner(comment.userId)){

                ownerActions =
                    '<button class="comment-action-btn" id="commentEditBtn-' + comment.commentId + '"'

                    + comment.commentId

                    + '<button class="comment-action-btn" id="commentSaveBtn-' + comment.commentId + '"'
                    + ' style="display:none;"'
                    + ' onmousedown="prepareCommentBlurAction('
                    + comment.commentId + ',\'save\')"'
                    + ' onclick="event.stopPropagation();saveComment('
                    + comment.commentId + ')">저장</button>'
                    + '<button class="comment-action-btn" id="commentCancelBtn-' + comment.commentId + '"'
                    + ' style="display:none;"'
                    + ' onmousedown="prepareCommentBlurAction('
                    + comment.commentId + ',\'cancel\')"'
                    + ' onclick="event.stopPropagation();cancelEditComment('
                    + comment.commentId + ')">취소</button>'
                    + '<button class="comment-action-btn danger" id="commentDeleteBtn-' + comment.commentId + '"'
                    + ' title="삭제" onclick="event.stopPropagation();deleteComment('
                    + comment.commentId + ')"><i class="fa-regular fa-trash-can"></i> 삭제</button>'
                    + '<button class="comment-action-btn" id="commentStatusBtn-' + comment.commentId + '"'
                    + ' title="' + statusLabel + '" onclick="event.stopPropagation();changeCommentStatus('
                    + comment.commentId
                    + ',\'' + statusAction + '\')">'
                    + '<i class="fa-solid fa-check"></i> ' + statusLabel
                    + '</button>';
            }

			html +=
			    '<div class="comment-item'
			    + (comment.commentId === selectedCommentId ? ' selected-comment' : '')
			    + (comment.status === 'RESOLVED' ? ' resolved-comment' : '')
			    + (collapsedCommentIds.includes(String(comment.commentId)) ? ' collapsed-comment' : '')
			    + '" data-comment-id="' + comment.commentId
			    + '" onclick="moveToComment(' + comment.commentId + ',' + comment.pageNum + ',' + comment.posY + ');">'
			    + '<div class="comment-card-header">'
			    + createUserAvatar(comment.userId, 'comment-avatar')
			    + '<div class="comment-author-wrap">'
				+ '<b>' + escapeHtml(comment.userName || comment.userId) + '</b>'
				+ '<span class="comment-date">'
				+ formatCommentDate(comment.createDt)
                + ' · '
                + formatCommentNumber(comment.commentCode)
				+ '</span>'
				+ '</div>'
			    + '<span class="comment-status">'
			    + (comment.status === 'RESOLVED' ? '해결됨' : '미해결')
			    + '</span>'
			    + '<button type="button" class="comment-collapse-btn"'
			    + ' title="댓글 접기/펼치기"'
			    + ' onclick="event.stopPropagation();toggleComment('
			    + comment.commentId
			    + ')"><span class="comment-chevron" aria-hidden="true"></span></button>'
			    + '</div>'
			    + '<div class="comment-card-body">'
			    + '<div id="commentTextView-' + comment.commentId
			    + '" class="comment-text'
			    + (isOwner(comment.userId)
			        ? ' editable-comment-text'
			        : '')
			    + '"></div>'
			    + '<textarea id="commentEditText-' + comment.commentId + '"'
			    + ' class="comment-edit-text" style="display:none;"'
                + ' placeholder="코멘트 내용을 입력하세요."></textarea>'
                + '<div id="commentEditAttachmentZone-' + comment.commentId + '"'
                + ' class="edit-attachment-zone" style="display:none;"'
                + ' onclick="event.stopPropagation();">'
                + '<div class="edit-attachment-tools">'
                + '<label for="commentEditAttachments-' + comment.commentId + '"'
                + ' class="attachment-select-btn">'
                + '<i class="fa-solid fa-paperclip"></i> 파일 선택'
                + '</label>'
                + '<input id="commentEditAttachments-' + comment.commentId + '"'
                + ' class="attachment-file-input" type="file" multiple>'
                + '<span>붙여넣기 또는 끌어 놓기</span>'
                + '</div>'
                + '<div id="commentEditAttachmentList-' + comment.commentId + '"'
                + ' class="reply-attachment-list"></div>'
                + '</div>'
			    + '<div id="attachmentList-' + comment.commentId + '"'
			    + ' class="comment-attachment-list"></div>'
			    + '<div class="comment-actions">'
			    + ownerActions
			    + '</div>'
			    + '<div id="replyList-' + comment.commentId + '" class="reply-list"></div>'
			    + '<div id="replyComposerZone-' + comment.commentId + '"'
			    + ' class="reply-composer-zone">'
			    + '<div class="reply-composer">'
			    + '<textarea id="replyText-' + comment.commentId + '"'
			    + ' placeholder="답글 추가..."'
			    + ' onfocus="sendEditing(true,' + comment.commentId + ')"'
			    + ' onblur="sendEditing(false,' + comment.commentId + ')"></textarea>'
			    + '<button onclick="event.stopPropagation();addReply(' + comment.commentId + ')">답글</button>'
			    + '</div>'
			    + '<div id="replyAttachmentList-' + comment.commentId + '"'
			    + ' class="reply-attachment-list"></div>'
			    + '<div class="reply-drop-hint">'
			    + '<i class="fa-solid fa-paperclip"></i> 파일 또는 이미지를 끌어 놓아 첨부'
			    + '</div>'
			    + '</div>'
			    + '</div>'
			    + '</div>';

        });

        if(lastPageNum !== null){
            html += '</section>';
        }

        document.getElementById('commentList').innerHTML =
            html || '<div class="comment-empty">검색 결과가 없습니다.</div>';

        visibleComments.forEach(comment => {

            renderMentionText(
                document.getElementById(
                    'commentTextView-' + comment.commentId

                comment.commentText
            );

            if(isOwner(comment.userId)){

                );

function toggleComment(commentId){

    const commentKey =
        String(commentId);

    const commentItem =
        document.querySelector(
            '.comment-item[data-comment-id="'
            + commentId
            + '"]'
        );

    if(!commentItem){
        return;
    }

    commentItem.classList.toggle(
        'collapsed-comment'
    );

    if(commentItem.classList.contains(
            'collapsed-comment')){

        if(!collapsedCommentIds.includes(commentKey)){
            collapsedCommentIds.push(commentKey);
        }

    }else{

        collapsedCommentIds =
            collapsedCommentIds.filter(
                item => item !== commentKey
            );
    }

    sessionStorage.setItem(
        'collapsedCommentIds',
        JSON.stringify(collapsedCommentIds)
    );

    updateToggleAllButton();
}

function toggleAllComments(){

    const items =
        [...document.querySelectorAll('.comment-item')];

    if(items.length === 0){
        return;
    }

    const shouldCollapse =
        items.some(item =>
            !item.classList.contains('collapsed-comment'));

    items.forEach(item => {

        const commentId =
            String(item.dataset.commentId);

        item.classList.toggle(
            'collapsed-comment',
            shouldCollapse
        );

        if(shouldCollapse){
            if(!collapsedCommentIds.includes(commentId)){
                collapsedCommentIds.push(commentId);
            }
        }else{
            collapsedCommentIds =
                collapsedCommentIds.filter(
                    id => id !== commentId
                );
        }
    });

    sessionStorage.setItem(
        'collapsedCommentIds',
        JSON.stringify(collapsedCommentIds)
    );

    updateToggleAllButton();
}

function updateToggleAllButton(){

    const button =
        document.getElementById('toggleAllCommentsBtn');
    const items =
        [...document.querySelectorAll('.comment-item')];
    const allCollapsed =
        items.length > 0
        && items.every(item =>
            item.classList.contains('collapsed-comment'));

    button.textContent =
        allCollapsed ? '전체 펼치기' : '전체 접기';
}

function navigateUnresolved(direction){

    if(!currentPdfId){
        return;
    }

    fetch(
        '/api/comment/list?pdfId='
        + currentPdfId
        + '&status=OPEN'
    )
    .then(response => response.json())
    .then(comments => {

        const unresolved =
            [...comments].sort((first, second) =>
                first.pageNum - second.pageNum
                || Number(first.rectY || first.posY || 0)
                    - Number(second.rectY || second.posY || 0)
                || first.commentId - second.commentId);

        if(unresolved.length === 0){
            alert('미해결 댓글이 없습니다.');
            return;
        }

        let currentIndex =
            unresolved.findIndex(comment =>
                comment.commentId === selectedCommentId);

        if(currentIndex < 0){
            currentIndex =
                direction > 0 ? -1 : 0;
        }

        const nextIndex =
            (currentIndex + direction + unresolved.length)
            % unresolved.length;
        const target = unresolved[nextIndex];

        document.getElementById('commentSearch').value = '';
        document.getElementById('commentStatusFilter').value = 'ALL';
        currentCommentFilter = 'ALL';

        loadComments();

        setTimeout(
            () => moveToComment(
                target.commentId,
                target.pageNum,
                target.posY
            ),
            250
        );
    })
    .catch(showApiError);
}

function startEditComment(commentId, options = {}){

    const editText = document.getElementById(
        'commentEditText-' + commentId

    editText.dataset.originalValue = editText.value;
    setMentionInputVisible(editText, true);
    document.getElementById(
        'commentEditAttachmentZone-' + commentId
    ).style.display = 'block';
    renderCommentEditPendingAttachments(commentId);

    document.getElementById(
        'commentSaveBtn-' + commentId
    ).style.display = 'inline-block';

    document.getElementById(
        'commentCancelBtn-' + commentId
    ).style.display = 'inline-block';

    setCommentCreationEditingUi(
        commentId,
        Boolean(options.creation)
    );

    const editButton =
        document.getElementById(
            'commentEditBtn-' + commentId
        );

    if(editButton){
        editButton.style.display = 'none';
    }

    editText.focus();
    editText.setSelectionRange(
        editText.value.length,
        editText.value.length
    );

}
