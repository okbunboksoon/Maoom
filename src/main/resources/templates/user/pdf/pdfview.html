            '.comment-item[data-comment-id="'
            + commentId
            + '"]'
        );

    commentItem?.classList.toggle(
        'creating-comment',
        enabled
    );

    [
        'commentEditBtn-',
        'commentStatusBtn-',
        'commentDeleteBtn-',
        'replyList-',
        'replyComposerZone-'
    ].forEach(prefix => {
        const element =
            document.getElementById(prefix + commentId);

        if(element){
            element.style.display = displayValue;
        }
    });
}

function prepareCommentBlurAction(commentId, action){
    commentBlurActions.set(Number(commentId), action);
}

function scheduleCommentAutoSave(commentId){
    const normalizedId = Number(commentId);

    setTimeout(() => {
        const blurAction =
            commentBlurActions.get(normalizedId);
        commentBlurActions.delete(normalizedId);

        if(blurAction === 'save'
                || blurAction === 'cancel'){
            return;
        }

        const editText = document.getElementById(
            'commentEditText-' + normalizedId
        );
        const wrapper =
            editText?.closest('.mention-input-wrap');
        const editingVisible =
            wrapper
            ? wrapper.style.display !== 'none'
            : editText?.style.display !== 'none';

        if(!editText || !editingVisible){
            return;
        }

        const attachmentZone =
            document.getElementById(
                'commentEditAttachmentZone-'
                + normalizedId
            );

        if(shouldKeepEditOpen(
                editText,
                attachmentZone)){
            return;
        }

        const currentValue = editText.value.trim();
        const originalValue =
            String(
                editText.dataset.originalValue || ''
            ).trim();
        const files =
            pendingCommentEditAttachments.get(normalizedId)
            || [];

        if(currentValue.length === 0){
            if(originalValue.length === 0){
                cancelEditComment(normalizedId);
                return;
            }

            alert('댓글 내용을 입력해주세요.');
            editText.focus();
            return;
        }

        if(currentValue === originalValue
                && files.length === 0){
            cancelEditComment(normalizedId);
            return;
        }

        saveComment(normalizedId);
    }, 250);
}

function prepareReplyBlurAction(replyId, action){
    replyBlurActions.set(Number(replyId), action);
}

function scheduleReplyAutoSave(replyId, commentId){
    const normalizedReplyId = Number(replyId);

    setTimeout(() => {
        const blurAction =
            replyBlurActions.get(normalizedReplyId);
        replyBlurActions.delete(normalizedReplyId);

        if(blurAction === 'save'
                || blurAction === 'cancel'){
            return;
        }

        const editText =
            document.getElementById(
                'replyEditText-'
                + normalizedReplyId
            );
        const wrapper =
            editText?.closest('.mention-input-wrap');
        const editingVisible =
            wrapper
            ? wrapper.style.display !== 'none'
            : editText?.style.display !== 'none';

        if(!editText || !editingVisible){
            return;
        }

        const attachmentZone =
            document.getElementById(
                'replyEditAttachmentZone-'
                + normalizedReplyId
            );

        if(shouldKeepEditOpen(
                editText,
                attachmentZone)){
            return;
        }

        const currentValue = editText.value.trim();
        const originalValue =
            String(
                editText.dataset.originalValue || ''
            ).trim();
        const files =
            pendingReplyEditAttachments.get(
                normalizedReplyId
            ) || [];

        if(currentValue.length === 0){
            alert('답글 내용을 입력해주세요.');
            editText.focus();
            return;
        }

        if(currentValue === originalValue
                && files.length === 0){
            cancelEditReply(
                normalizedReplyId,
                commentId
            );
            return;
        }

        saveReply(
            normalizedReplyId,
            commentId
        );
    }, 250);
}

function shouldKeepEditOpen(editText, attachmentZone){
    const activeElement = document.activeElement;
    const blockedUntil =
        Number(
            attachmentZone?.dataset
            .autoSaveBlockedUntil || 0
        );

    return activeElement === editText
        || Boolean(
            attachmentZone
            && activeElement
            && attachmentZone.contains(activeElement)
        )
        || Date.now() < blockedUntil;
}

function isOwner(userId){

    return currentUser
        && currentUser.userId === userId;

}

function formatCommentDate(dateText){

    if(!dateText){
        return '';
    }

    const date =
        new Date(dateText);

    if(Number.isNaN(date.getTime())){
        return dateText.substring(0,16);
    }

    return new Intl.DateTimeFormat(
        'ko-KR',
        {
            month:'numeric',
            day:'numeric',
            hour:'numeric',
            minute:'2-digit'
        }
    ).format(date);
}

function formatCommentNumber(commentCode){

    const number =
        String(commentCode || '')
        .replace(/\D/g, '');

    return number || '-';
}

function createUserAvatar(userId, className){
    const imageUrl =
        '/api/user/profile-image?userId='
        + encodeURIComponent(userId || '');

    return '<span class="' + className + '">'
        + '<img src="' + imageUrl + '" alt="" loading="lazy"'
        + ' onerror="this.hidden=true">'
        + '<i class="fa-solid fa-user"></i>'
        + '</span>';
}

function changeCommentStatus(commentId,status){

    fetch('/api/comment/status',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            commentId:commentId,
            status:status
        })
    })
    .then(handleApiResponse)
    .then(result => {

        loadComments();

    })
    .catch(showApiError);

}

function cancelEditComment(commentId){

    commentBlurActions.delete(Number(commentId));
    pendingCommentEditAttachments.delete(Number(commentId));

    const textView =
        document.getElementById(
            'commentTextView-' + commentId
        );

    const editText =
        document.getElementById(
            'commentEditText-' + commentId
        );

    editText.value = textView.textContent;
    renderMentionInputHighlight(editText);
    textView.style.display = 'block';
    setMentionInputVisible(editText, false);
    document.getElementById(
        'commentEditAttachmentZone-' + commentId
    ).style.display = 'none';
    renderCommentEditPendingAttachments(commentId);

    document.getElementById(
        'commentSaveBtn-' + commentId
    ).style.display = 'none';

    document.getElementById(
        'commentCancelBtn-' + commentId
    ).style.display = 'none';

    setCommentCreationEditingUi(commentId, false);

    const editButton =
        document.getElementById(
            'commentEditBtn-' + commentId
        );

    if(editButton){
        editButton.style.display = '';
    }

    sendEditing(false, commentId);

}

function saveComment(commentId){

    const normalizedId = Number(commentId);
    const files =
        pendingCommentEditAttachments.get(normalizedId) || [];

    if(commentSaveInProgress.has(normalizedId)){
        return;
    }

    const commentText =
        document.getElementById(
            'commentEditText-' + commentId
        ).value.trim();

    if(commentText.length === 0){
        alert('댓글 내용을 입력해주세요.');
        return;
    }

    commentSaveInProgress.add(normalizedId);

    return fetch('/api/comment/update',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            commentId:commentId,
            commentText:commentText
        })
    })
    .then(handleApiResponse)
    .then(() =>
        uploadAttachments(
            normalizedId,
            files
        )
    )
    .then(() => {

        pendingCommentEditAttachments.delete(normalizedId);
        sendEditing(false, commentId);
        return loadComments();

    })
    .catch(showApiError)
    .finally(() => {
        commentSaveInProgress.delete(normalizedId);
        commentBlurActions.delete(normalizedId);
    });

}

function deleteComment(commentId, options = {}){

    if(!options.skipConfirm
            && !confirm('댓글을 삭제하시겠습니까?')){
        return;
    }

    fetch('/api/comment/delete',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            commentId:commentId
        })
    })
    .then(handleApiResponse)
    .then(result => {

        if(selectedCommentId === commentId){
            selectedCommentId = null;
        }

        loadComments();

    })
    .catch(showApiError);

}

// PDF에서 선택한 본인 주석은 Delete 또는 Backspace 키로 삭제한다.
function handleSelectedCommentDelete(event){

    if(event.key !== 'Delete'
            && event.key !== 'Backspace'){
        return;
    }

    if(event.ctrlKey || event.metaKey || event.altKey
            || isTextEditingTarget(event.target)
            || selectedCommentData
            || rectStartData
            || drawingStartData
            || selectedCommentId === null){
        return;
    }

    const selectedComment =
        loadedComments.find(comment =>
            comment.commentId === selectedCommentId);

    if(!selectedComment
            || !['TEXT', 'RECT', 'CALLOUT', 'DRAW']
                .includes(selectedComment.commentType)
            || !isOwner(selectedComment.userId)){
        return;
    }

    consumeAnnotationShortcut(event);
    deleteComment(
        selectedComment.commentId,
        {
            skipConfirm:true
        }
    );
}

function isTextEditingTarget(target){
    return Boolean(
        target
        && (target.matches('input, textarea, select, button')
            || target.isContentEditable)
    );
}



// PDF.js 문서 위에 댓글 위치 또는 선택 영역 하이라이트를 표시한다.
function drawHighlights(comments, pageNumbers){
	
    const viewer =
        document.getElementById('pdfViewer');

    const viewerWindow =
        viewer.contentWindow;
    const pageNumberSet =
        pageNumbers && pageNumbers.size > 0
        ? new Set(
            Array.from(pageNumbers)
            .map(Number)
        )
        : null;
    if(pageNumberSet){
        pageNumberSet.forEach(pageNumber => {
            const page =
                viewerWindow.document.querySelector(
                    '[data-page-number="' + pageNumber + '"]'
                );

            if(!page){
                return;
            }

            page.querySelectorAll(
                '.pdf-comment-highlight, .pdf-comment-preview, '
                + '.pdf-text-highlight-selection-outline, '
                + '.pdf-comment-hover-popup'
            ).forEach(e => e.remove());
        });
    }else{
        viewerWindow.document
            .querySelectorAll(
                '.pdf-comment-highlight, .pdf-comment-preview, '
                + '.pdf-text-highlight-selection-outline, '
                + '.pdf-comment-hover-popup'
            )
            .forEach(e => e.remove());
    }

    comments.forEach(comment => {

        if(pageNumberSet
                && !pageNumberSet.has(Number(comment.pageNum))){
            return;
        }

		if(
		    comment.commentType !== 'TEXT'
		    &&
		    comment.commentType !== 'RECT'
		    &&
		    comment.commentType !== 'CALLOUT'
		    &&
		    comment.commentType !== 'DRAW'
		){
		    return;
		}

        const page =
            viewerWindow.document.querySelector(
                '[data-page-number="' + comment.pageNum + '"]'
            );
        if(!page){
            return;
        }

        if(comment.commentType === 'TEXT'){
            const textRects =
                parseTextHighlightRects(comment.drawingPath);

            if(textRects.length > 0){
                drawTextHighlightFragments(
                    comment,
                    page,
                    viewerWindow,
                    textRects
                );
                return;
            }
        }

        const highlight =
            viewerWindow.document.createElement('div');

        highlight.className =
            'pdf-comment-highlight';
			
		highlight.dataset.commentId =
		    comment.commentId;
        highlight.dataset.commentType =
            comment.commentType;

		highlight.style.pointerEvents =
		    'auto';

		highlight.onclick = function(){

		    if(highlight.dataset.dragged === 'true'){
		        highlight.dataset.dragged = 'false';
		        return;
		    }

		    moveToComment(
		        comment.commentId,
		        comment.pageNum,
		        comment.posY
		    );

		};	
		
        highlight.style.position =
            'absolute';

		highlight.style.left =
		    ((comment.rectX * 100) - 0.3) + '%';
 
        highlight.style.top =
            (comment.rectY * 100) + '%';

		highlight.style.width =
		    ((comment.rectW * 100) + 0.5) + '%';

        highlight.style.height =
            (comment.rectH * 100) + '%';

		if(comment.commentType === 'TEXT'){

		    highlight.style.background =
		        '#ffcca2';
            highlight.style.mixBlendMode =
                'darken';

		    highlight.style.opacity =
		        '1';

            const textBounds =
                getExpandedTextHighlightRect(
                    {
                        x:Number(comment.rectX),
                        y:Number(comment.rectY),
                        w:Number(comment.rectW),
                        h:Number(comment.rectH)
                    },
                    page
                );
            highlight.style.left =
                (textBounds.x * 100) + '%';
            highlight.style.top =
                (textBounds.y * 100) + '%';
            highlight.style.width =
                (textBounds.w * 100) + '%';
            highlight.style.height =
                (textBounds.h * 100) + '%';
            storeTextHighlightBounds(
                highlight,
                textBounds
            );

            attachCommentHoverPopup(
                highlight,
                comment,
                viewerWindow
            );

		}
		else if(comment.commentType === 'RECT'){

		    highlight.style.background =
		        'transparent';

		    highlight.style.border =
		        '2px solid red';

		    highlight.style.opacity =
		        '1';

		    highlight.style.left =
		        (comment.rectX * 100) + '%';
		    highlight.style.top =
		        (comment.rectY * 100) + '%';
		    highlight.style.width =
		        (comment.rectW * 100) + '%';
		    highlight.style.height =
		        (comment.rectH * 100) + '%';
		    highlight.style.boxSizing =
		        'border-box';

		    enableRectEditing(
		        highlight,
		        comment,
		        page,
		        viewerWindow
		    );

		}

		else if(comment.commentType === 'DRAW'){

		    const points =
		        parseDrawingPoints(comment.drawingPath);

		    if(points.length < 2){
		        return;
		    }

		    const bounds = getDrawingBounds(points);
		    highlight.style.left =
		        (bounds.x * 100) + '%';
		    highlight.style.top =
		        (bounds.y * 100) + '%';
		    highlight.style.width =
		        (bounds.w * 100) + '%';
		    highlight.style.height =
		        (bounds.h * 100) + '%';
		    highlight.style.background = 'transparent';
		    highlight.style.border = 'none';
		    highlight.style.overflow = 'visible';

		    const svg = createDrawingSvg(
		        viewerWindow.document,
		        'pdf-saved-drawing'
		    );
		    const path = createDrawingPath(
		        viewerWindow.document
		    );
		    path.setAttribute(
		        'd',
		        buildLocalDrawingPath(points, bounds)
		    );
		    svg.appendChild(path);
		    highlight.appendChild(svg);
		}
		
		else if(comment.commentType === 'CALLOUT'){

		    const icon =
		        createCalloutIconElement(
                    viewerWindow.document
                );

		    const popup =
		        viewerWindow.document.createElement('div');

		    popup.style.display = 'none';
		    popup.style.position = 'absolute';
		    popup.style.left = '35px';
		    popup.style.top = '-10px';
		    popup.style.minWidth = '180px';
		    popup.style.maxWidth = '300px';
		    popup.style.padding = '12px';
		    popup.style.background = '#ffffff';
		    popup.style.border = '1px solid #d0d0d0';
		    popup.style.borderRadius = '8px';
		    popup.style.boxShadow = '0 4px 12px rgba(0,0,0,.2)';
		    popup.style.zIndex = '99999';
		    popup.style.color = '#333';
		    popup.style.fontSize = '13px';

		    const popupUser =
		        viewerWindow.document.createElement('div');

		    popupUser.style.fontWeight = 'bold';
		    popupUser.style.marginBottom = '8px';
		    popupUser.textContent = comment.userName || comment.userId;

		    const popupText =
		        viewerWindow.document.createElement('div');

		    popupText.textContent = comment.commentText;

		    popup.appendChild(popupUser);
		    popup.appendChild(popupText);
		    highlight.appendChild(icon);
		    highlight.appendChild(popup);

		    highlight.style.background = 'transparent';
		    highlight.style.border = 'none';
		    highlight.style.fontSize = '28px';
		    highlight.style.color = '#e11d2e';
		    highlight.style.width = '30px';
		    highlight.style.height = '30px';
		    highlight.style.overflow = 'visible';

		    enableCalloutEditing(
		        highlight,
		        comment,
		        page,
		        viewerWindow,
		        popup
		    );

		    highlight.onmouseenter = function(){
		        popup.style.display = 'block';
		    };

		    highlight.onmouseleave = function(){
		        popup.style.display = 'none';
		    };

		}

		highlight.style.pointerEvents =
		    'auto';

        page.appendChild(highlight);

    });

    if(selectedCommentId !== null){
        selectHighlight(selectedCommentId);
    }

}

function scheduleHighlightRedraw(delay, pageNumber){
    clearTimeout(highlightRedrawTimer);

    if(Number.isFinite(Number(pageNumber))
            && !highlightRedrawFull){
        highlightRedrawPages.add(Number(pageNumber));
    }else{
        highlightRedrawFull = true;
        highlightRedrawPages.clear();
    }

    highlightRedrawTimer = setTimeout(function(){
        requestAnimationFrame(function(){
            const pageNumbers =
                highlightRedrawFull
                ? null
                : new Set(highlightRedrawPages);

            highlightRedrawFull = false;
            highlightRedrawPages.clear();

            drawHighlights(loadedComments, pageNumbers);
        });
    }, delay || 40);
}

function drawTextHighlightFragments(
        comment,
        page,
        viewerWindow,
        textRects){

    textRects.forEach(rect => {
        const textBounds =
            getExpandedTextHighlightRect(
                rect,
                page
            );
        const highlight =
            viewerWindow.document.createElement('div');

        highlight.className =
            'pdf-comment-highlight pdf-text-highlight-fragment';
        highlight.dataset.commentId =
            comment.commentId;
        highlight.dataset.commentType =
            comment.commentType;
        highlight.style.position =
            'absolute';
        highlight.style.left =
            (textBounds.x * 100) + '%';
        highlight.style.top =
            (textBounds.y * 100) + '%';
        highlight.style.width =
            (textBounds.w * 100) + '%';
        highlight.style.height =
            (textBounds.h * 100) + '%';
        storeTextHighlightBounds(
            highlight,
            textBounds
        );
        highlight.style.background =
            '#ffcca2';
        highlight.style.mixBlendMode =
            'darken';
        highlight.style.opacity =
            '1';
        highlight.style.pointerEvents =
            'auto';

        highlight.onclick = function(){
            moveToComment(
                comment.commentId,
                comment.pageNum,
                comment.posY
            );
        };

        attachCommentHoverPopup(
            highlight,
            comment,
            viewerWindow
        );

        page.appendChild(highlight);
    });
}

function storeTextHighlightBounds(target, bounds){
    target.dataset.highlightX = String(bounds.x);
    target.dataset.highlightY = String(bounds.y);
    target.dataset.highlightW = String(bounds.w);
    target.dataset.highlightH = String(bounds.h);
}

function readTextHighlightBounds(target){
    const x =
        Number(target.dataset.highlightX);
    const y =
        Number(target.dataset.highlightY);
    const w =
        Number(target.dataset.highlightW);
    const h =
        Number(target.dataset.highlightH);

    if(
        !Number.isFinite(x)
        || !Number.isFinite(y)
        || !Number.isFinite(w)
        || !Number.isFinite(h)
        || w <= 0
        || h <= 0
    ){
        return null;
    }

    return {
        x:x,
        y:y,
        w:w,
        h:h
    };
}

function getExpandedTextHighlightRect(rect, page){
    const pageRect =
        page && page.getBoundingClientRect
        ? page.getBoundingClientRect()
        : null;
    const horizontalPadding =
        pageRect && pageRect.width > 0
        ? 12 / pageRect.width
        : 0;
    const verticalPadding =
        pageRect && pageRect.height > 0
        ? 1.5 / pageRect.height
        : 0;
    const verticalOffset =
        pageRect && pageRect.height > 0
        ? 3 / pageRect.height
        : 0;
    const x1 =
        clampRatio(Number(rect.x) - horizontalPadding);
    const y1 =
        clampRatio(
            Number(rect.y)
            - verticalPadding
            - verticalOffset
        );
    const x2 =
        clampRatio(
            Number(rect.x)
            + Number(rect.w)
            + horizontalPadding
        );
    const y2 =
        clampRatio(
            Number(rect.y)
            + Number(rect.h)
            + verticalPadding
            - verticalOffset
        );

    return {
        x:x1,
        y:y1,
        w:Math.max(0.001, x2 - x1),
        h:Math.max(0.001, y2 - y1)
    };
}

function parseTextHighlightRects(drawingPath){
    if(!drawingPath){
        return [];
    }

    try{
        const data = JSON.parse(drawingPath);
        const rects =
            Array.isArray(data)
            ? data
            : data && Array.isArray(data.rects)
                ? data.rects
                : [];

        return rects.filter(rect =>
            Number.isFinite(Number(rect.x))
            && Number.isFinite(Number(rect.y))
            && Number.isFinite(Number(rect.w))
            && Number.isFinite(Number(rect.h))
            && Number(rect.w) > 0
            && Number(rect.h) > 0
        ).map(rect => ({
            x:Number(rect.x),
            y:Number(rect.y),
            w:Number(rect.w),
            h:Number(rect.h)
        }));
    }catch(error){
        return [];
    }
}

function attachCommentHoverPopup(
        highlight,
        comment,
        viewerWindow){

    const hoverText =
        String(
            comment.commentText
            || comment.selectedText
            || ''
        ).trim();

    if(!hoverText){
        return;
    }

    const popup =
        viewerWindow.document.createElement('div');

    popup.className = 'pdf-comment-hover-popup';
    popup.innerHTML =
        '<div class="pdf-comment-hover-author">'
        + escapeHtml(comment.userName || comment.userId)
        + '</div>'
        + '<div class="pdf-comment-hover-text">'
        + escapeHtml(hoverText)
        + '</div>';

    highlight.addEventListener('mouseenter', function(){
        const page =
            highlight.closest('.page');

        if(!page){
            return;
        }

        if(!popup.isConnected){
            page.appendChild(popup);
        }

        popup.classList.add('visible');
        positionCommentHoverPopup(popup, highlight);
    });

    highlight.addEventListener('mouseleave', function(){
        popup.classList.remove('visible');
    });
}

function positionCommentHoverPopup(popup, highlight){
    const page =
        highlight.closest('.page');

    if(!page){
        return;
    }

    const pageRect =
        page.getBoundingClientRect();
    const highlightRect =
        highlight.getBoundingClientRect();
    const pagePadding = 8;
    const popupWidth =
        Math.max(
            220,
            Math.min(330, pageRect.width - (pagePadding * 2))
        );
    const preferredLeft =
        highlightRect.left;
    const clampedLeft =
        Math.min(
            Math.max(
                preferredLeft,
                pageRect.left + pagePadding
            ),
            pageRect.right - popupWidth - pagePadding
        );

    popup.style.width = popupWidth + 'px';
    popup.style.left =
        (clampedLeft - pageRect.left) + 'px';
    popup.style.right = 'auto';
    popup.style.top =
        (highlightRect.bottom - pageRect.top + 4) + 'px';
    popup.style.bottom = 'auto';

    const popupRect =
        popup.getBoundingClientRect();
    const fitsAbove =
        highlightRect.top
        - popupRect.height
        - 4
        >= pageRect.top + pagePadding;

    if(popupRect.bottom > pageRect.bottom - pagePadding
            && fitsAbove){
        popup.style.top =
            (
                highlightRect.top
                - pageRect.top
                - popupRect.height
                - 4
            ) + 'px';
    }
}

function createCalloutIconElement(viewerDocument){
    const icon =
        viewerDocument.createElement('span');

    icon.className = 'pdf-callout-icon';
    icon.setAttribute('aria-hidden', 'true');
    icon.innerHTML = getCalloutIconSvg();

    return icon;
}

function getCalloutIconSvg(){
    return '<svg viewBox="0 0 32 32" focusable="false">'
        + '<path class="pdf-callout-icon-fill" d="M5 6.5h22v14H14.5L7 26.5v-6H5z"></path>'
        + '<path class="pdf-callout-icon-stroke" d="M5 6.5h22v14H14.5L7 26.5v-6H5z"></path>'
        + '<circle cx="12" cy="13.8" r="1.6"></circle>'
        + '<circle cx="16" cy="13.8" r="1.6"></circle>'
        + '<circle cx="20" cy="13.8" r="1.6"></circle>'
        + '</svg>';
}

// 작성자가 말풍선 아이콘을 끌어 PDF 페이지 안에서 위치를 변경한다.
function enableCalloutEditing(
        highlight,
        comment,
        page,
        viewerWindow,
        popup){

    if(!isOwner(comment.userId)){
        return;
    }

    highlight.style.cursor = 'move';
    highlight.style.touchAction = 'none';

    highlight.addEventListener('mousedown', function(event){

        if(event.button !== 0 || popup.contains(event.target)){
            return;
        }

        event.preventDefault();
        event.stopPropagation();

        const pageRect =
            page.getBoundingClientRect();
        const startX = event.clientX;
        const startY = event.clientY;
        const initialX = Number(comment.rectX);
        const initialY = Number(comment.rectY);
        const iconWidth = 30 / pageRect.width;
        const iconHeight = 30 / pageRect.height;
        let changed = false;

        function clamp(value, minimum, maximum){
            return Math.min(
                Math.max(value, minimum),
                maximum
            );
        }

        function onMouseMove(moveEvent){

            const deltaX =
                (moveEvent.clientX - startX) / pageRect.width;
            const deltaY =
                (moveEvent.clientY - startY) / pageRect.height;

            if(Math.abs(deltaX) > 0.002
                    || Math.abs(deltaY) > 0.002){
                changed = true;
                highlight.dataset.dragged = 'true';
                popup.style.display = 'none';
            }

            comment.rectX = clamp(
                initialX + deltaX,
                0,
                1 - iconWidth
            );
            comment.rectY = clamp(
                initialY + deltaY,
                0,
                1 - iconHeight
            );

            highlight.style.left =
                (comment.rectX * 100) + '%';
            highlight.style.top =
                (comment.rectY * 100) + '%';
        }

        function onMouseUp(){

            viewerWindow.document.removeEventListener(
                'mousemove',
                onMouseMove
            );
            viewerWindow.document.removeEventListener(
                'mouseup',
                onMouseUp
            );

            if(changed){
                saveCommentGeometry(comment);
            }
        }

        viewerWindow.document.addEventListener(
            'mousemove',
            onMouseMove
        );
        viewerWindow.document.addEventListener(
            'mouseup',
            onMouseUp
        );
    });
}

const RECT_HANDLE_DIRECTIONS = [
    'nw', 'n', 'ne', 'e', 'se', 's', 'sw', 'w'
];

function positionRectHandle(handle, direction){
    const edge = '-7px';

    handle.style.top =
        direction.includes('n')
        ? edge
        : direction.includes('s')
            ? 'auto'
            : '50%';
    handle.style.bottom =
        direction.includes('s') ? edge : 'auto';
    handle.style.left =
        direction.includes('w')
        ? edge
        : direction.includes('e')
            ? 'auto'
            : '50%';
    handle.style.right =
        direction.includes('e') ? edge : 'auto';

    const translateX =
        !direction.includes('w')
        && !direction.includes('e')
        ? '-50%'
        : '0';
    const translateY =
        !direction.includes('n')
        && !direction.includes('s')
        ? '-50%'
        : '0';
    handle.style.transform =
        'translate(' + translateX + ',' + translateY + ')';
}

function createDrawingSvg(viewerDocument, className){
    const svg = viewerDocument.createElementNS(
        'http://www.w3.org/2000/svg',
        'svg'
    );
    svg.setAttribute('viewBox', '0 0 1 1');
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.className.baseVal = className;
    svg.style.position = 'absolute';
    svg.style.inset = '0';
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.overflow = 'visible';
    svg.style.pointerEvents = 'none';
    svg.style.zIndex = '1001';
    return svg;
}

function createDrawingPath(viewerDocument){
    const path = viewerDocument.createElementNS(
        'http://www.w3.org/2000/svg',
        'path'
    );
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#145cff');
    path.setAttribute('stroke-width', '3');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    path.setAttribute('vector-effect', 'non-scaling-stroke');
    return path;
}

function buildDrawingPath(points){
    return points.map((point, index) =>
        (index === 0 ? 'M ' : ' L ')
        + point.x + ' ' + point.y
    ).join('');
}

function buildLocalDrawingPath(points, bounds){
    const width = Math.max(bounds.w, 0.0001);
    const height = Math.max(bounds.h, 0.0001);

    return buildDrawingPath(
        points.map(point => ({
            x:(point.x - bounds.x) / width,
            y:(point.y - bounds.y) / height
        }))
    );
}

function parseDrawingPoints(drawingPath){
    if(!drawingPath){
        return [];
    }

    try{
        const points = JSON.parse(drawingPath);
        return Array.isArray(points)
            ? points.filter(point =>
                Number.isFinite(Number(point.x))
                && Number.isFinite(Number(point.y))
            ).map(point => ({
                x:Number(point.x),
                y:Number(point.y)
            }))
            : [];
    }catch(error){
        return [];
    }
}

function getDrawingBounds(points){
    const xs = points.map(point => point.x);
    const ys = points.map(point => point.y);
    const minimumSize = 0.006;
    const x = Math.max(Math.min(...xs) - 0.003, 0);
    const y = Math.max(Math.min(...ys) - 0.003, 0);
    const maxX = Math.min(Math.max(...xs) + 0.003, 1);
    const maxY = Math.min(Math.max(...ys) + 0.003, 1);

    return {
        x:x,
        y:y,
        w:Math.max(maxX - x, minimumSize),
        h:Math.max(maxY - y, minimumSize)
    };
}

// 작성자의 사각형을 본체 드래그로 이동하고 여덟 핸들로 크기를 조절한다.
function enableRectEditing(highlight, comment, page, viewerWindow){

    if(!isOwner(comment.userId)){
        return;
    }

    highlight.style.cursor = 'move';
    highlight.style.touchAction = 'none';

    RECT_HANDLE_DIRECTIONS.forEach(direction => {

        const handle =
            viewerWindow.document.createElement('span');

        handle.className =
            'pdf-rect-resize-handle pdf-rect-handle-' + direction;
        handle.dataset.direction = direction;
        handle.style.position = 'absolute';
        handle.style.width = '12px';
        handle.style.height = '12px';
        handle.style.background = '#fff';
        handle.style.border = '2px solid #1473e6';
        handle.style.borderRadius = '50%';
        handle.style.boxSizing = 'border-box';
        handle.style.zIndex = '2';
        handle.style.display = 'none';
        positionRectHandle(handle, direction);
        handle.style.cursor = direction + '-resize';

        highlight.appendChild(handle);
    });

    highlight.addEventListener('mousedown', function(event){

        if(event.button !== 0){
            return;
        }

        event.preventDefault();
        event.stopPropagation();

        const pageRect =
            page.getBoundingClientRect();
        const direction =
            event.target.dataset.direction || 'move';
        const startX = event.clientX;
        const startY = event.clientY;
        const initial = {
            x:Number(comment.rectX),
            y:Number(comment.rectY),
            w:Number(comment.rectW),
            h:Number(comment.rectH)
        };
        const minimumSize = 0.015;
        let changed = false;

        function clamp(value, minimum, maximum){
            return Math.min(
                Math.max(value, minimum),
                maximum
            );
        }

        function applyRect(rect){
            highlight.style.left = (rect.x * 100) + '%';
            highlight.style.top = (rect.y * 100) + '%';
            highlight.style.width = (rect.w * 100) + '%';
            highlight.style.height = (rect.h * 100) + '%';
        }

        function onMouseMove(moveEvent){

            const deltaX =
                (moveEvent.clientX - startX) / pageRect.width;
            const deltaY =
                (moveEvent.clientY - startY) / pageRect.height;

            if(Math.abs(deltaX) > 0.002
                    || Math.abs(deltaY) > 0.002){
                changed = true;
                highlight.dataset.dragged = 'true';
            }

            const rect = {...initial};

            if(direction === 'move'){
                rect.x = clamp(
                    initial.x + deltaX,
                    0,
                    1 - initial.w
                );
                rect.y = clamp(
                    initial.y + deltaY,
                    0,
                    1 - initial.h
                );
            }else{

                if(direction.includes('w')){
                    rect.x = clamp(
                        initial.x + deltaX,
                        0,
                        initial.x + initial.w - minimumSize
                    );
                    rect.w =
                        initial.x + initial.w - rect.x;
                }

                if(direction.includes('e')){
                    rect.w = clamp(
                        initial.w + deltaX,
                        minimumSize,
                        1 - initial.x
                    );
                }

                if(direction.includes('n')){
                    rect.y = clamp(
                        initial.y + deltaY,
                        0,
                        initial.y + initial.h - minimumSize
                    );
                    rect.h =
                        initial.y + initial.h - rect.y;
                }

                if(direction.includes('s')){
                    rect.h = clamp(
                        initial.h + deltaY,
                        minimumSize,
                        1 - initial.y
                    );
                }
            }

            comment.rectX = rect.x;
            comment.rectY = rect.y;
            comment.rectW = rect.w;
            comment.rectH = rect.h;
            applyRect(rect);
        }

        function onMouseUp(){

            viewerWindow.document.removeEventListener(
                'mousemove',
                onMouseMove
            );
            viewerWindow.document.removeEventListener(
                'mouseup',
                onMouseUp
            );

            if(changed){
                saveCommentGeometry(comment);
            }
        }

        viewerWindow.document.addEventListener(
            'mousemove',
            onMouseMove
        );
        viewerWindow.document.addEventListener(
            'mouseup',
            onMouseUp
        );
    });
}

// 드래그가 끝난 사각형 또는 말풍선의 정규화 좌표를 DB에 저장한다.
function saveCommentGeometry(comment){

    fetch('/api/comment/geometry',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            commentId:comment.commentId,
            rectX:comment.rectX,
            rectY:comment.rectY,
            rectW:comment.rectW,
            rectH:comment.rectH
        })
    })
    .then(handleApiResponse)
    .catch(error => {
        showApiError(error);
        loadComments();
    });
}

function drawSelectedCommentPreview(commentData){

    const viewerWindow =
        document.getElementById('pdfViewer').contentWindow;

    viewerWindow.document
        .querySelectorAll('.pdf-comment-preview')
        .forEach(e => e.remove());

    const page =
        viewerWindow.document.querySelector(
            '[data-page-number="' + commentData.pageNum + '"]'
        );

    if(!page){
        return;
    }

    if(commentData.commentType === 'TEXT'){
        const textRects =
            parseTextHighlightRects(commentData.drawingPath);

        if(textRects.length > 0){
            textRects.forEach(rect => {
                const textBounds =
                    getExpandedTextHighlightRect(rect, page);
                const fragment =
                    viewerWindow.document.createElement('div');

                fragment.className =
                    'pdf-comment-preview pdf-text-highlight-preview';
                fragment.style.position = 'absolute';
                fragment.style.left =
                    (textBounds.x * 100) + '%';
                fragment.style.top =
                    (textBounds.y * 100) + '%';
                fragment.style.width =
                    (textBounds.w * 100) + '%';
                fragment.style.height =
                    (textBounds.h * 100) + '%';
                fragment.style.background =
                    '#ffcca2';
                fragment.style.mixBlendMode = 'darken';
                fragment.style.pointerEvents = 'none';
                fragment.style.zIndex = '1000';

                page.appendChild(fragment);
            });
            return;
        }
    }

    const preview =
        viewerWindow.document.createElement('div');

    preview.className =
        'pdf-comment-preview';

    preview.style.position = 'absolute';
    preview.style.left = (commentData.rectX * 100) + '%';
    preview.style.top = (commentData.rectY * 100) + '%';
    preview.style.boxSizing = 'border-box';
    preview.style.zIndex = '1000';

    if(commentData.commentType === 'TEXT'){
        const textBounds =
            getExpandedTextHighlightRect(
                {
                    x:Number(commentData.rectX),
                    y:Number(commentData.rectY),
                    w:Number(commentData.rectW),
                    h:Number(commentData.rectH)
                },
                page
            );
        preview.style.left =
            (textBounds.x * 100) + '%';
        preview.style.top =
            (textBounds.y * 100) + '%';
        preview.style.width =
            (textBounds.w * 100) + '%';
        preview.style.height =
            (textBounds.h * 100) + '%';
        preview.style.background = '#ffcca2';
        preview.style.mixBlendMode = 'darken';
        preview.style.opacity = '1';
        preview.style.pointerEvents = 'none';
    }

    if(commentData.commentType === 'RECT'){
        preview.style.width = (commentData.rectW * 100) + '%';
        preview.style.height = (commentData.rectH * 100) + '%';
        preview.style.background = 'transparent';
        preview.style.border = '3px solid #ff1f1f';
        preview.style.pointerEvents = 'auto';

        enableRectPreviewEditing(
            preview,
            commentData,
            page,
            viewerWindow
        );
    }

    if(commentData.commentType === 'CALLOUT'){
        preview.classList.add('pdf-callout-icon');
        preview.innerHTML = getCalloutIconSvg();
        preview.style.width = '30px';
        preview.style.height = '30px';
        preview.style.fontSize = '28px';
        preview.style.lineHeight = '30px';
        preview.style.color = '#e11d2e';
        preview.style.pointerEvents = 'none';
    }

    if(commentData.commentType === 'DRAW'){
        const points =
            parseDrawingPoints(commentData.drawingPath);
        const bounds = getDrawingBounds(points);
        preview.style.left = (bounds.x * 100) + '%';
        preview.style.top = (bounds.y * 100) + '%';
        preview.style.width = (bounds.w * 100) + '%';
        preview.style.height = (bounds.h * 100) + '%';
        preview.style.pointerEvents = 'none';

        const svg = createDrawingSvg(
            viewerWindow.document,
            'pdf-drawing-preview'
        );
        const path = createDrawingPath(
            viewerWindow.document
        );
        path.setAttribute(
            'd',
            buildLocalDrawingPath(points, bounds)
        );
        svg.appendChild(path);
        preview.appendChild(svg);
    }

    page.appendChild(preview);

}

function moveToComment(commentId,pageNum,posY){

    selectedCommentId = commentId;

    document.querySelectorAll('.comment-item')
        .forEach(item => item.classList.remove('selected-comment'));

    const commentItem =
        document.querySelector(
            '.comment-item[data-comment-id="'
            + commentId
            + '"]'
        );

    if(commentItem){
        commentItem.classList.add('selected-comment');
    }

    const viewerWindow =
        document.getElementById('pdfViewer').contentWindow;

    viewerWindow.PDFViewerApplication.pdfViewer.currentPageNumber =
        pageNum;

    setTimeout(function(){

        const page =
            viewerWindow.document.querySelector(
                '[data-page-number="' + pageNum + '"]'
            );

        if(page){

            const y =
                page.offsetTop +
                (page.offsetHeight * posY);

            viewerWindow.scrollTo({
                top:y - 150,
                behavior:'smooth'
            });

        }

        selectHighlight(commentId);

    },300);

}

function selectHighlight(commentId){

    const viewerWindow =
        document.getElementById('pdfViewer').contentWindow;

    viewerWindow.document
        .querySelectorAll('.pdf-text-highlight-selection-outline')
        .forEach(item => item.remove());

    viewerWindow.document
        .querySelectorAll('.pdf-comment-highlight')
        .forEach(item => {

            item.classList.remove('selected-pdf-comment-highlight');
            item.style.outline = '';
            item.style.outlineOffset = '';
            item.style.filter = '';
            item.style.boxShadow = '';
            clearTextHighlightSelectionBorder(item);
            if(item.dataset.commentType === 'TEXT'){
                item.style.background =
                    '#ffcca2';
                item.style.mixBlendMode =
                    'darken';
            }
            item.querySelectorAll(
                '.pdf-rect-resize-handle'
            ).forEach(handle => {
                handle.style.display = 'none';
            });

        });

    const targets =
        viewerWindow.document.querySelectorAll(
            '[data-comment-id="' + commentId + '"]'
        );

    const targetList =
        Array.from(targets);
    const textTargets =
        targetList.filter(target =>
            target.dataset.commentType === 'TEXT'
        );

    targetList.forEach(target => {
        target.classList.add('selected-pdf-comment-highlight');

        if(target.dataset.commentType === 'TEXT'){
            target.style.background =
                '#ffcca2';
            target.style.mixBlendMode =
                'darken';
        }else{
            target.style.outline =
                '1px solid #ff1f1f';
            target.style.outlineOffset = '2px';
            target.style.filter =
                'drop-shadow(0 0 1px rgba(255,31,31,.45))';
            target.style.boxShadow =
                '0 0 0 1px rgba(255,31,31,.55)';
        }

        target.querySelectorAll(
            '.pdf-rect-resize-handle'
        ).forEach(handle => {
            handle.style.display = 'block';
        });

    });

    applyTextHighlightSelectionBorder(textTargets);

}

function clearTextHighlightSelectionBorder(target){
    if(!target || target.dataset.commentType !== 'TEXT'){
        return;
    }

    target.style.borderColor = '';
    target.style.borderStyle = '';
    target.style.borderWidth = '';
    target.style.borderRadius = '';
    target.style.boxSizing = '';
}

function applyTextHighlightSelectionBorder(targets){
    if(!targets || targets.length === 0){
        return;
    }

    const page =
        targets[0].closest('.page');

    if(!page){
        return;
    }

    const pageWidth =
        page.clientWidth;
    const pageHeight =
        page.clientHeight;

    if(pageWidth <= 0 || pageHeight <= 0){
        return;
    }

    const normalizedRows =
        mergeLineRects(
            targets
                .map(readTextHighlightBounds)
                .filter(Boolean)
        );

    if(normalizedRows.length === 0){
        return;
    }

    const rowBounds =
        normalizedRows.map(rect => ({
            left:rect.x * pageWidth,
            top:rect.y * pageHeight,
            right:(rect.x + rect.w) * pageWidth,
            bottom:(rect.y + rect.h) * pageHeight
        }));
    const outline =
        page.ownerDocument.createElementNS(
            'http://www.w3.org/2000/svg',
            'svg'
        );
    const path =
        page.ownerDocument.createElementNS(
            'http://www.w3.org/2000/svg',
            'path'
        );

    outline.classList.add(
        'pdf-text-highlight-selection-outline'
    );
    outline.setAttribute(
        'viewBox',
        '0 0 ' + pageWidth + ' ' + pageHeight
    );
    outline.setAttribute('preserveAspectRatio', 'none');
    outline.style.position = 'absolute';
    outline.style.inset = '0';
    outline.style.width = '100%';
    outline.style.height = '100%';
    outline.style.overflow = 'visible';
    outline.style.pointerEvents = 'none';
    outline.style.zIndex = '1002';

    path.setAttribute(
        'd',
        buildTextHighlightOutlinePath(
            rowBounds,
            pageWidth,
            pageHeight
        )
    );
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#1473e6');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-linejoin', 'round');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('vector-effect', 'non-scaling-stroke');

    outline.appendChild(path);
    page.appendChild(outline);
}

function buildTextHighlightOutlinePath(
        rows,
        pageWidth,
        pageHeight){
    if(!rows || rows.length === 0){
        return '';
    }

    const horizontalPadding = 0;
    const topPadding = 0;
    const bottomPadding = 0;
    const minimumX = 1;
    const minimumY = 1;
    const maximumX =
        Number.isFinite(pageWidth)
        ? Math.max(minimumX, pageWidth - 1)
        : Number.POSITIVE_INFINITY;
    const maximumY =
        Number.isFinite(pageHeight)
        ? Math.max(minimumY, pageHeight - 1)
        : Number.POSITIVE_INFINITY;
    const sorted =
        rows
            .map(row => ({
                left:Math.max(
                    minimumX,
                    row.left - horizontalPadding
                ),
                top:Math.max(
                    minimumY,
                    row.top - topPadding
                ),
                right:Math.min(
                    maximumX,
                    row.right + horizontalPadding
                ),
                bottom:Math.min(
                    maximumY,
                    row.bottom + bottomPadding
                )
            }))
            .sort((a, b) =>
                a.top - b.top || a.left - b.left
            );

    if(sorted.length === 1){
        const row = sorted[0];

        return [
            'M' + row.left.toFixed(2)
                + ' ' + row.top.toFixed(2),
            'L' + row.right.toFixed(2)
                + ' ' + row.top.toFixed(2),
            'L' + row.right.toFixed(2)
                + ' ' + row.bottom.toFixed(2),
            'L' + row.left.toFixed(2)
                + ' ' + row.bottom.toFixed(2),
            'Z'
        ].join(' ');
    }

    const boundaries =
        sorted.slice(0, -1).map((row, index) =>
            (row.bottom + sorted[index + 1].top) / 2
        );
    const points = [
        [sorted[0].left, sorted[0].top],
        [sorted[0].right, sorted[0].top]
    ];

    sorted.forEach((row, index) => {
        const bottom =
            index < boundaries.length
            ? boundaries[index]
            : row.bottom;

        points.push([row.right, bottom]);

        if(index < sorted.length - 1){
            points.push([sorted[index + 1].right, bottom]);
        }
    });

    points.push([
        sorted[sorted.length - 1].left,
        sorted[sorted.length - 1].bottom
    ]);

    for(let index = sorted.length - 1; index >= 0; index--){
        const row = sorted[index];
        const top =
            index > 0
            ? boundaries[index - 1]
            : row.top;

        points.push([row.left, top]);

        if(index > 0){
            points.push([sorted[index - 1].left, top]);
        }
    }

    return points
        .map((point, index) =>
            (index === 0 ? 'M' : 'L')
            + point[0].toFixed(2)
            + ' '
            + point[1].toFixed(2)
        )
        .join(' ')
        + ' Z';
}

function startEditReply(replyId,commentId){

        'replyTextView-' + replyId

    const editText = document.getElementById(
        'replyEditText-' + replyId
    );
    editText.dataset.originalValue = editText.value;
    setMentionInputVisible(editText, true);
    document.getElementById(
        'replyEditAttachmentZone-' + replyId
    ).style.display = 'block';
    renderReplyEditPendingAttachments(replyId);

    document.getElementById(
        'replySaveBtn-' + replyId
    ).style.display = 'inline-block';

    document.getElementById(
        'replyCancelBtn-' + replyId
    ).style.display = 'inline-block';

    editText.focus();

}

function cancelEditReply(replyId,commentId){

    replyBlurActions.delete(Number(replyId));
    pendingReplyEditAttachments.delete(Number(replyId));

    const textView =
        document.getElementById(
            'replyTextView-' + replyId
        );

    const editText =
        document.getElementById(
            'replyEditText-' + replyId
        );

    editText.value = textView.textContent;
    renderMentionInputHighlight(editText);
    textView.style.display = 'inline';
    setMentionInputVisible(editText, false);
    document.getElementById(
        'replyEditAttachmentZone-' + replyId
    ).style.display = 'none';
    renderReplyEditPendingAttachments(replyId);

    document.getElementById(
        'replySaveBtn-' + replyId
    ).style.display = 'none';

    document.getElementById(
        'replyCancelBtn-' + replyId
    ).style.display = 'none';

    sendEditing(false, commentId);

}

function saveReply(replyId,commentId){

    const normalizedReplyId = Number(replyId);

    if(replySaveInProgress.has(normalizedReplyId)){
        return;
    }

    const files =
        pendingReplyEditAttachments.get(normalizedReplyId) || [];
    const replyText =
        document.getElementById(
            'replyEditText-' + replyId
        ).value.trim();

    if(replyText.length === 0){
        alert('답글 내용을 입력해주세요.');
        return;
    }

    replySaveInProgress.add(normalizedReplyId);

    fetch('/api/comment/reply/update',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            replyId:replyId,
            replyText:replyText
        })
    })
    .then(handleJsonResponse)
    .then(() =>
        uploadAttachments(
            commentId,
            files,
            normalizedReplyId
        )
    )
    .then(() => {

        pendingReplyEditAttachments.delete(normalizedReplyId);
        sendEditing(false, commentId);
        loadReplies(commentId);

    })
    .catch(showApiError)
    .finally(() => {
        replySaveInProgress.delete(normalizedReplyId);
        replyBlurActions.delete(normalizedReplyId);
    });

}

function deleteReply(replyId,commentId){

    if(!confirm('답글을 삭제하시겠습니까?')){
        return;
    }

    fetch('/api/comment/reply/delete',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            replyId:replyId
        })
    })
    .then(handleApiResponse)
    .then(result => {

        loadReplies(commentId);

    })
    .catch(showApiError);

}

function addReply(commentId){

    const files =
        pendingReplyAttachments.get(commentId) || [];
    const replyText =
        document.getElementById(
            'replyText-' + commentId
        ).value.trim();

    if(replyText.length === 0 && files.length === 0){
        alert('답글 내용 또는 이미지를 추가해주세요.');
        return;
    }

    fetch('/api/comment/reply/add',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            commentId:commentId,
            replyText:replyText
        })
    })
    .then(handleJsonResponse)
    .then(replyId =>
        uploadAttachments(
            commentId,
            files,
            Number(replyId)
        )
    )
    .then(() => {

        document.getElementById('replyText-' + commentId).value = '';
        renderMentionInputHighlight(
            document.getElementById('replyText-' + commentId)
        );
        pendingReplyAttachments.delete(commentId);
        renderReplyPendingAttachments(commentId);
        sendEditing(false, commentId);

        loadReplies(commentId);

    })
    .catch(showApiError);

}

// 답글 작성 영역에도 파일 드래그앤드롭을 연결한다.
function initializeReplyAttachmentDrop(commentId){

    const zone =
        document.getElementById(
            'replyComposerZone-' + commentId
        );

    if(!zone || zone.dataset.dropReady === 'true'){
        return;
    }

    zone.dataset.dropReady = 'true';
    let dragDepth = 0;

    zone.addEventListener('dragenter', function(event){
        event.preventDefault();
        event.stopPropagation();
        dragDepth++;
        zone.classList.add('attachment-drag-over');
    });

    zone.addEventListener('dragover', function(event){
        event.preventDefault();
        event.stopPropagation();
        event.dataTransfer.dropEffect = 'copy';
    });

    zone.addEventListener('dragleave', function(event){
        event.preventDefault();
        event.stopPropagation();
        dragDepth--;

        if(dragDepth <= 0){
            dragDepth = 0;
            zone.classList.remove('attachment-drag-over');
        }
    });

    zone.addEventListener('drop', function(event){
        event.preventDefault();
        event.stopPropagation();
        dragDepth = 0;
        zone.classList.remove('attachment-drag-over');

        addReplyPendingAttachments(
            commentId,
            [...event.dataTransfer.files]
        );
    });
}

// 답글별 첨부 대기 목록에 중복되지 않은 파일만 추가한다.
function addReplyPendingAttachments(commentId, files){

    const savedFiles =
        pendingReplyAttachments.get(commentId) || [];

    files.forEach(file => {
        const duplicate =
            savedFiles.some(savedFile =>
                savedFile.name === file.name
                && savedFile.size === file.size
                && savedFile.lastModified === file.lastModified);

        if(!duplicate){
            savedFiles.push(file);
        }
    });

    pendingReplyAttachments.set(commentId, savedFiles);
    renderReplyPendingAttachments(commentId);
}

// 답글 등록 전에 첨부할 파일명과 개별 취소 버튼을 표시한다.
function renderReplyPendingAttachments(commentId){

    const container =
        document.getElementById(
            'replyAttachmentList-' + commentId
        );

    if(!container){
        return;
    }

    const files =
        pendingReplyAttachments.get(commentId) || [];

    container.replaceChildren();

    files.forEach((file, index) => {
        const item = document.createElement('span');
        const name = document.createElement('span');
        const remove = document.createElement('button');

        item.className = 'selected-attachment';
        name.textContent = file.name;
        remove.type = 'button';
        remove.textContent = '×';
        remove.title = '첨부 취소';
        remove.addEventListener('click', function(event){
            event.stopPropagation();
            files.splice(index, 1);

            if(files.length === 0){
                pendingReplyAttachments.delete(commentId);
            }

            renderReplyPendingAttachments(commentId);
        });

        item.append(name, remove);
        container.appendChild(item);
    });
}

function resizeCommentText(textarea){

    textarea.style.height = 'auto';
    textarea.style.height =
        Math.min(textarea.scrollHeight, 132) + 'px';
    textarea.style.overflowY =
        textarea.scrollHeight > 132
        ? 'auto'
        : 'hidden';
}

function setupMentionInputHighlight(textarea){

    if(!textarea
            || textarea.dataset.mentionHighlightReady === 'true'){
        return;
    }

    const initiallyHidden =
        textarea.style.display === 'none';
    const wrapper = document.createElement('div');
    const highlight = document.createElement('div');

    wrapper.className = 'mention-input-wrap';
    highlight.className = 'mention-input-highlight';
    highlight.setAttribute('aria-hidden', 'true');

    textarea.parentNode.insertBefore(wrapper, textarea);
    wrapper.append(highlight, textarea);
    textarea.style.display = 'block';
    wrapper.style.display = initiallyHidden ? 'none' : '';
    textarea.dataset.mentionHighlightReady = 'true';

    const computed = window.getComputedStyle(textarea);
    [
        'paddingTop', 'paddingRight',
        'paddingBottom', 'paddingLeft',
        'borderTopWidth', 'borderRightWidth',
        'borderBottomWidth', 'borderLeftWidth',
        'fontFamily', 'fontSize', 'fontWeight',
        'fontStyle', 'lineHeight', 'letterSpacing',
        'textAlign', 'textIndent', 'textTransform',
        'wordSpacing', 'tabSize'
    ].forEach(property => {
        highlight.style[property] = computed[property];
    });

    textarea.addEventListener(
        'input',
        () => renderMentionInputHighlight(textarea)
    );
    textarea.addEventListener(
        'scroll',
        () => renderMentionInputHighlight(textarea)
    );

    renderMentionInputHighlight(textarea);
}

function setMentionInputVisible(textarea, visible){

    const wrapper =
        textarea?.closest('.mention-input-wrap');

    if(wrapper){
        wrapper.style.display = visible ? '' : 'none';
    }else if(textarea){
        textarea.style.display = visible ? 'block' : 'none';
    }

    if(visible){
        renderMentionInputHighlight(textarea);
    }
}

function setupClipboardImagePaste(textarea, addFiles){

    if(!textarea
            || textarea.dataset.clipboardImageReady === 'true'){
        return;
    }

    textarea.dataset.clipboardImageReady = 'true';
    textarea.addEventListener('paste', function(event){

        const imageFiles = Array.from(
            event.clipboardData?.items || []
        )
        .filter(item =>
            item.kind === 'file'
            && item.type.startsWith('image/'))
        .map((item, index) => {
            const blob = item.getAsFile();

            if(!blob){
                return null;
            }

            const extension =
                item.type === 'image/jpeg'
                ? 'jpg'
                : (item.type.split('/')[1] || 'png');

            return new File(
                [blob],
                'clipboard-'
                    + Date.now()
                    + '-'
                    + (index + 1)
                    + '.'
                    + extension,
                {
                    type:item.type,
                    lastModified:Date.now()
                }
            );
        })
        .filter(Boolean);

        if(imageFiles.length === 0){
            return;
        }

        event.preventDefault();
        addFiles(imageFiles);
    });
}

function addEditPendingAttachments(
        pendingMap,
        itemId,
        files,
        render){

    const savedFiles = pendingMap.get(itemId) || [];

    files.forEach(file => {
        const duplicate =
            savedFiles.some(savedFile =>
                savedFile.name === file.name
                && savedFile.size === file.size
                && savedFile.lastModified === file.lastModified);

        if(!duplicate){
            savedFiles.push(file);
        }
    });

    if(savedFiles.length > 0){
        pendingMap.set(itemId, savedFiles);
    }

    render();
}

// 외부 파일을 끌 때 textarea가 포커스를 잃어도 수정 모드를 유지한다.
function initializeEditAttachmentDrop(
        zone,
        addFiles,
        editText){

    if(!zone || zone.dataset.dropReady === 'true'){
        return;
    }

    zone.dataset.dropReady = 'true';
    let dragDepth = 0;
    const targets = [zone, editText].filter(Boolean);

    zone.addEventListener('mousedown', function(){
        markEditAttachmentInteraction(zone);
    });
    zone.addEventListener('click', function(){
        markEditAttachmentInteraction(zone);
    });

    targets.forEach(target => {
        target.addEventListener('dragenter', function(event){
            event.preventDefault();
            event.stopPropagation();
            markEditAttachmentInteraction(zone);
            dragDepth++;
            zone.classList.add('attachment-drag-over');
        });

        target.addEventListener('dragover', function(event){
            event.preventDefault();
            event.stopPropagation();
            event.dataTransfer.dropEffect = 'copy';
        });

        target.addEventListener('dragleave', function(event){
            event.preventDefault();
            event.stopPropagation();
            dragDepth--;

            if(dragDepth <= 0){
                dragDepth = 0;
                zone.classList.remove('attachment-drag-over');
            }
        });

        target.addEventListener('drop', function(event){
            event.preventDefault();
            event.stopPropagation();
            markEditAttachmentInteraction(zone);
            dragDepth = 0;
            zone.classList.remove('attachment-drag-over');
            addFiles([...event.dataTransfer.files]);
            editText?.focus();
        });
    });
}

function markEditAttachmentInteraction(
        zone,
        duration = 1500){

    if(zone){
        zone.dataset.autoSaveBlockedUntil =
            String(Date.now() + duration);
    }
}

function setupMentionAutocomplete(textarea){

    if(!textarea){
        return;
    }

    setupMentionInputHighlight(textarea);

    if(textarea.dataset.mentionReady === 'true'){
        return;
    }

    textarea.dataset.mentionReady = 'true';

    textarea.addEventListener(
        'input',
        () => updateMentionAutocomplete(textarea)
    );
    textarea.addEventListener(
        'click',
        () => updateMentionAutocomplete(textarea)
    );
    textarea.addEventListener('keydown', function(event){

        if(!mentionState
                || mentionState.textarea !== textarea){
            return;
        }

        if(event.key === 'ArrowDown'
                || event.key === 'ArrowUp'){

            event.preventDefault();

            const direction =
                event.key === 'ArrowDown' ? 1 : -1;

            mentionState.index =
                (mentionState.index
                    + direction
                    + mentionState.users.length)
                % mentionState.users.length;

            renderMentionAutocomplete();
        }

        if(event.key === 'Enter'){
            event.preventDefault();
            selectMentionUser(
                mentionState.users[
                    mentionState.index
                ]
            );
        }

        if(event.key === 'Escape'){
            event.preventDefault();
            closeMentionAutocomplete();
        }
    });

    textarea.addEventListener('blur', function(){
        setTimeout(closeMentionAutocomplete, 120);
    });
}

function updateMentionAutocomplete(textarea){

    const cursor = textarea.selectionStart;
    const beforeCursor =
        textarea.value.slice(0, cursor);
    const match =
        beforeCursor.match(
            /(^|\s)@([^\s@]*)$/
        );

    if(!match){
        closeMentionAutocomplete();
        return;
    }

    const query = match[2].toLowerCase();
    const users =
        mentionUsers.filter(user =>
            String(user.userId || '')
                .toLowerCase()
                .includes(query)
            || String(user.userName || '')
                .toLowerCase()
                .includes(query))
        .slice(0, 8);

    if(users.length === 0){
        closeMentionAutocomplete();
        return;
    }

    mentionState = {
        textarea:textarea,
        users:users,
        index:0,
        start:cursor - match[2].length - 1,
        end:cursor
    };

    renderMentionAutocomplete();
}

function renderMentionAutocomplete(){

    const menu =
        document.getElementById(
            'mentionAutocomplete'
        );
    const textarea = mentionState.textarea;
    const rect = textarea.getBoundingClientRect();

    menu.replaceChildren();
    menu.style.display = 'block';
    menu.style.left =
        Math.min(
            rect.left,
            window.innerWidth - 230
        ) + 'px';
    menu.style.top =
        Math.min(
            rect.bottom + 4,
            window.innerHeight - 220
        ) + 'px';
    menu.style.width =
        Math.min(rect.width, 280) + 'px';

    mentionState.users.forEach((user, index) => {

        const item = document.createElement('button');
        const name = user.userName || user.userId;

        item.type = 'button';
        item.className =
            'mention-autocomplete-item'
            + (index === mentionState.index
                ? ' active'
                : '');
        item.setAttribute('role', 'option');
        item.innerHTML =
            '<b>@' + escapeHtml(name) + '</b>'
            + '<span>' + escapeHtml(user.userId) + '</span>';
        item.onmousedown = event => {
            event.preventDefault();
            selectMentionUser(user);
        };

        menu.appendChild(item);
    });
}

function selectMentionUser(user){

    if(!mentionState){
        return;
    }

    const textarea = mentionState.textarea;
    const mention =
        '@' + (user.userName || user.userId) + ' ';

    textarea.value =
        textarea.value.slice(0, mentionState.start)
        + mention
        + textarea.value.slice(mentionState.end);

    const cursor =
        mentionState.start + mention.length;

    textarea.focus();
    textarea.setSelectionRange(cursor, cursor);
    closeMentionAutocomplete();
    textarea.dispatchEvent(
        new Event('input', { bubbles:true })
    );
}

function closeMentionAutocomplete(){

    mentionState = null;
    document.getElementById(
        'mentionAutocomplete'
    ).style.display = 'none';
}

function escapeHtml(value){
    return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

// 저장된 코멘트와 답글의 @멘션을 읽기 쉬운 태그로 표시한다.
function renderMentionText(
    target,
    text,
    mentionClass = 'comment-mention'
){

    const content = String(text || '');
    const mentionPattern =
        /(^|[^\p{L}\p{N}._%+-])(@[\p{L}\p{N}._-]+(?:@[A-Za-z0-9.-]+)?)/gu;
    let lastIndex = 0;
    let match;

    target.replaceChildren();

    while((match = mentionPattern.exec(content)) !== null){

        const mentionStart =
            match.index + match[1].length;

        target.appendChild(
            document.createTextNode(
                content.slice(lastIndex, mentionStart)
            )
        );

        const mention = document.createElement('span');
        mention.className = mentionClass;
        mention.textContent = match[2];
        target.appendChild(mention);

        lastIndex = mentionStart + match[2].length;
    }

    target.appendChild(
        document.createTextNode(
            content.slice(lastIndex)
        )
    );
}

function uploadAttachments(commentId, files, replyId){

    if(files.length === 0){
        return Promise.resolve();
    }

    const formData = new FormData();

    formData.append('commentId', commentId);
    if(replyId != null){
        formData.append('replyId', replyId);
    }
    files.forEach(file =>
        formData.append('files', file));

    return fetch(
        '/api/comment/attachment/upload',
        {
            method:'POST',
            body:formData
        }
    ).then(handleApiResponse);
}

function showAttachmentImagePreview(event){

    const preview =
        document.getElementById(
            'attachmentImagePreview'
        );
    const previewImage = preview.querySelector('img');

    previewImage.src = event.currentTarget.src;
    previewImage.alt = event.currentTarget.alt;
    preview.classList.add('visible');
    preview.setAttribute('aria-hidden', 'false');
    moveAttachmentImagePreview(event);
}

function moveAttachmentImagePreview(event){

    const preview =
        document.getElementById(
            'attachmentImagePreview'
        );
    const margin = 16;
    const previewWidth =
        Math.min(520, window.innerWidth - margin * 2);
    const previewHeight =
        Math.min(420, window.innerHeight - margin * 2);
    let left = event.clientX - previewWidth - 18;
    let top = event.clientY - previewHeight / 2;

    if(left < margin){
        left = event.clientX + 18;
    }

    left = Math.max(
        margin,
        Math.min(
            left,
            window.innerWidth - previewWidth - margin
        )
    );
    top = Math.max(
        margin,
        Math.min(
            top,
            window.innerHeight - previewHeight - margin
        )
    );

    preview.style.left = left + 'px';
    preview.style.top = top + 'px';
    preview.style.width = previewWidth + 'px';
    preview.style.height = previewHeight + 'px';
}

function hideAttachmentImagePreview(){

    const preview =
        document.getElementById(
            'attachmentImagePreview'
        );

    preview.classList.remove('visible');
    preview.setAttribute('aria-hidden', 'true');
}
