<!DOCTYPE html>
<!-- BER 반영: 서버가 접근 가능한 DITA 경로를 받아 배치를 실행하고 입력 경로의 Result_Folder에 결과를 반환한다. -->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BER 반영</title>
    <link rel="stylesheet" href="/user/css/RevisionPopup.css">
</head>
<body>
<main class="revision-page revision-estimate-page">
    <header class="revision-header">
        <div>
            <h1>BER 반영</h1>
            <p>입력 경로를 작업 폴더로 복사한 뒤 BER 반영을 합니다.</p>
        </div>
    </header>

    <section class="revision-panel" aria-label="BER 반영 배치 실행">
        <div class="step-title">
            <span>1</span>
            <div>
                <strong>입력 경로 선택</strong>
                <small>서버 PC에서 접근할 수 있는 경로를 입력하세요.(V서버, H서버)</small>
            </div>
        </div>

        <div class="path-row ber-path-row full-path-row">
            <label for="ditaPath">입력경로</label>
            <input id="ditaPath" type="text"
                   placeholder="경로를 입력하세요" autocomplete="off">
            <span></span>
            <span></span>
        </div>

        <section id="resultPanel" class="result-panel" hidden aria-live="polite">
            <div class="result-heading">
                <span id="statusIndicator" class="status-indicator"></span>
                <strong id="resultTitle">실행 준비 중</strong>
            </div>
            <p id="resultMessage"></p>
        </section>

        <footer class="popup-actions">
            <button id="runBerBtn" class="action-button primary" type="button">실행</button>
            <button class="action-button" type="button" onclick="window.close()">취소</button>
        </footer>
    </section>
</main>

<script>
const ditaPathInput = document.getElementById('ditaPath');
const runBerBtn = document.getElementById('runBerBtn');
const resultPanel = document.getElementById('resultPanel');
const statusIndicator = document.getElementById('statusIndicator');
const resultTitle = document.getElementById('resultTitle');
const resultMessage = document.getElementById('resultMessage');

runBerBtn.addEventListener('click', runBerApply);
ditaPathInput.addEventListener('keydown', event => {
    if(event.key === 'Enter'){
        runBerApply();
    }
});

// 입력값을 JSON으로 서버에 보내고, 서버가 반환한 결과 폴더 경로를 화면에 표시한다.
async function runBerApply(){
    const ditaPath = ditaPathInput.value.trim();

    if(!ditaPath){
        showResult('error', '경로 확인 필요', '입력 경로를 입력해 주세요.');
        ditaPathInput.focus();
        return;
    }

    runBerBtn.disabled = true;
    runBerBtn.textContent = '반영 중...';
    ditaPathInput.disabled = true;
    showResult(
        'running',
        'BER 반영 실행 중',
        '완료될 때까지 창을 닫지 마세요.'
    );

    try{
        const response = await fetch('/api/ber/apply', {
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({ ditaPath })
        });

        if(!response.ok){
            throw new Error(await response.text() || 'BER 반영에 실패했습니다.');
        }

        const result = await response.json();
        showResult(
            'success',
            'BER 반영 완료',
            result.topicsPath);
    }catch(error){
        showResult(
            'error',
            'BER 반영 실패',
            error.message || 'BER 반영에 실패했습니다.');
    }finally{
        runBerBtn.disabled = false;
        runBerBtn.textContent = '실행';
        ditaPathInput.disabled = false;
    }
}

function showResult(type, title, message){
    resultPanel.hidden = false;
    resultPanel.dataset.status = type;
    statusIndicator.classList.toggle('is-running', type === 'running');
    resultTitle.textContent = title;
    resultMessage.textContent = message;
    resizePopupToContent();
}

// 결과 패널이 표시되면 팝업 창 높이를 콘텐츠에 맞춰 늘린다.
function resizePopupToContent(){
    requestAnimationFrame(() => {
        const browserFrameHeight = window.outerHeight - window.innerHeight;
        const contentHeight = document.documentElement.scrollHeight;
        const verticalMargin = 36;
        const nextHeight = Math.min(
            screen.availHeight,
            contentHeight + browserFrameHeight + verticalMargin
        );

        if(nextHeight > window.outerHeight){
            window.resizeTo(window.outerWidth, nextHeight);
        }
    });
}
</script>
</body>
</html>
