<!DOCTYPE html>
<!-- BER 반영: 서버가 접근 가능한 DITA 경로와 Output 경로를 받아 배치를 실행하고 결과 temp/topics를 반환한다. -->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BER 반영</title>
    <link rel="stylesheet" href="/user/css/ColorCheck.css?v=ber-apply-1">
    <script src="https://kit.fontawesome.com/51db22a717.js" crossorigin="anonymous"></script>
</head>
<body>
<main class="color-check-wrap">
    <header class="color-check-header">
        <div>
            <h1>BER 반영</h1>
            <p>DITA 경로를 기준으로 BER 배치를 실행합니다.</p>
        </div>
    </header>

    <section class="color-check-panel" aria-label="BER 반영 배치 실행">
        <div class="step-title">
            <span>1</span>
            <div>
                <strong>DITA 경로 입력</strong>
                <small>topics 폴더가 들어 있는 상위 경로 또는 DITA 파일 폴더를 입력하세요.</small>
            </div>
        </div>

        <div class="path-row ber-path-row">
            <label for="ditaPath">DITA 경로</label>
            <input id="ditaPath" type="text"
                   placeholder="예: C:\\work\\KUS\\manual">
            <span></span>
            <span></span>
        </div>

        <div class="path-row ber-path-row">
            <label for="outputPath">Output 경로</label>
            <input id="outputPath" type="text"
                   placeholder="예: V:\\Tools\\test 입력 시 V:\\Tools\\test\\결과">
            <span></span>
            <button id="runBerBtn" class="run-btn primary-btn" type="button">반영</button>
        </div>

        <div id="statusMessage" class="status-message" role="status"
             aria-live="polite" hidden></div>

        <footer class="color-check-actions">
            <button class="close-btn secondary-btn" type="button" onclick="window.close()">닫기</button>
        </footer>
    </section>
</main>

<script>
const ditaPathInput = document.getElementById('ditaPath');
const outputPathInput = document.getElementById('outputPath');
const runBerBtn = document.getElementById('runBerBtn');
const statusMessage = document.getElementById('statusMessage');

runBerBtn.addEventListener('click', runBerApply);
[ditaPathInput, outputPathInput].forEach(input => {
    input.addEventListener('keydown', event => {
        if(event.key === 'Enter'){
            runBerApply();
        }
    });
});

// 입력값을 JSON으로 서버에 보내고, 서버가 반환한 결과 폴더 경로를 화면에 표시한다.
async function runBerApply(){
    const ditaPath = ditaPathInput.value.trim();
    const outputPath = outputPathInput.value.trim();

    if(!ditaPath){
        showStatus('DITA 경로를 입력해 주세요.', 'error');
        ditaPathInput.focus();
        return;
    }

    runBerBtn.disabled = true;
    ditaPathInput.disabled = true;
    outputPathInput.disabled = true;
    showStatus('BER 반영 배치를 실행 중입니다. 완료될 때까지 창을 닫지 마세요.', 'progress');

    try{
        const response = await fetch('/api/ber/apply', {
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({ ditaPath, outputPath })
        });

        if(!response.ok){
            throw new Error(await response.text() || 'BER 반영에 실패했습니다.');
        }

        const result = await response.json();
        showStatus(
            'BER 반영 완료\n'
            + 'temp: ' + result.tempPath + '\n'
            + 'topics: ' + result.topicsPath,
            'success');
    }catch(error){
        showStatus(error.message || 'BER 반영에 실패했습니다.', 'error');
    }finally{
        runBerBtn.disabled = false;
        ditaPathInput.disabled = false;
        outputPathInput.disabled = false;
    }
}

function showStatus(message, type){
    statusMessage.hidden = false;
    statusMessage.textContent = message;
    statusMessage.className = 'status-message ' + type;
}
</script>
</body>
</html>
