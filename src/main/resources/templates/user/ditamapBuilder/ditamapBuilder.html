<!DOCTYPE html>
<!--
    DITAMAP Builder 시작 팝업.

    1. 서버 PC에서 접근 가능한 V서버/H서버 입력 경로를 받는다.
    2. 서버에서 경로를 검증하고 DITAMAP Builder용 조회/생성 흐름을 시작한다.
    3. 이 화면은 경로 입력, API 호출, 결과 메시지 표시만 담당한다.
-->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ditamap Builder</title>
    <link rel="stylesheet" href="/user/css/RevisionPopup.css">
</head>
<body>
<main class="revision-page revision-estimate-page">
    <header class="revision-header">
        <div>
            <h1>법규 Ditamap Builder</h1>
            <p>입력 경로를 입력하거나 붙여넣어 DITAMAP 작업을 시작합니다.</p>
        </div>
    </header>

    <section class="revision-panel" aria-label="입력 경로 선택">
        <div class="step-title">
            <span>1</span>
            <div>
                <strong>입력 경로 선택</strong>
                <small>서버 PC에서 접근할 수 있는 경로를 입력하세요.(V서버, H서버)</small>
            </div>
        </div>

        <div class="path-row full-path-row">
            <label for="ditaPath">입력경로</label>
            <input id="ditaPath"
                   type="text"
                   autocomplete="off"
                   placeholder="경로를 입력하세요">
            <span></span>
            <span></span>
        </div>

        <section id="resultPanel" class="result-panel" hidden aria-live="polite">
            <div class="result-heading">
                <span class="status-indicator"></span>
                <strong id="resultTitle">실행 준비 중</strong>
            </div>
            <p id="resultMessage"></p>
        </section>

        <footer class="popup-actions">
            <button id="confirmDitaPath"
                    class="action-button primary"
                    type="button">확인</button>
            <button class="action-button"
                    type="button"
                    onclick="window.close()">취소</button>
        </footer>
    </section>
</main>

<script>
// 파일 업로드는 하지 않고, 서버가 접근 가능한 DITA 경로 문자열만 전달한다.
const ditaPathInput =
    document.getElementById('ditaPath');
const resultPanel =
    document.getElementById('resultPanel');
const resultTitle =
    document.getElementById('resultTitle');
const resultMessage =
    document.getElementById('resultMessage');

function showResult(type, title, message){
    resultPanel.hidden = false;
    resultPanel.dataset.status = type;
    resultTitle.textContent = title;
    resultMessage.textContent = message;
    resizePopupToContent();
}

function resizePopupToContent(){
    requestAnimationFrame(() => {
        const browserFrameHeight = window.outerHeight - window.innerHeight;
        const contentHeight = document.documentElement.scrollHeight;
        const verticalMargin = 36;
        const nextHeight = Math.min(
            screen.availHeight,
            contentHeight + browserFrameHeight + verticalMargin
        );
        if(Math.abs(nextHeight - window.outerHeight) > 8){
            window.resizeTo(window.outerWidth, nextHeight);
        }
    });
}

document.getElementById('confirmDitaPath')
    .addEventListener('click', function(){
        const path = ditaPathInput.value.trim();

        if(!path){
            showResult('error', '경로 확인 필요', '입력 경로를 입력해 주세요.');
            ditaPathInput.focus();
            return;
        }

        const popupWidth = Math.min(
            Math.max(screen.availWidth - 80, 1600),
            screen.availWidth);
        const popupHeight = Math.min(
            Math.max(screen.availHeight - 80, 900),
            screen.availHeight);
        const popupLeft = Math.max(0, Math.floor((screen.availWidth - popupWidth) / 2));
        const popupTop = Math.max(0, Math.floor((screen.availHeight - popupHeight) / 2));
        const resultWindow = window.open(
            '/ditamap-builder/diff?path=' + encodeURIComponent(path),
            'ditamapBuilderDiff',
            'width=' + popupWidth
                + ',height=' + popupHeight
                + ',left=' + popupLeft
                + ',top=' + popupTop
                + ',menubar=no,toolbar=no,location=no,status=no,scrollbars=yes,resizable=yes'
        );

        if(resultWindow){
            showResult('success', '법규 Ditamap Builder 열기', '새 창에서 DITA MAP을 엽니다.');
            resultWindow.focus();
            try{
                resultWindow.resizeTo(popupWidth, popupHeight);
                resultWindow.moveTo(popupLeft, popupTop);
            }catch(error){
                // 브라우저 정책상 resize/move가 막히면 window.open 크기 옵션만 사용한다.
            }
        }else{
            showResult('error', '팝업 차단 확인', '팝업 차단을 해제한 뒤 다시 확인을 눌러 주세요.');
        }
    });
</script>
</body>
</html>
