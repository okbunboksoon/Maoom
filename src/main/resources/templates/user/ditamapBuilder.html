<!DOCTYPE html>
<!-- DITAMAP Builder 작업을 시작하기 위한 DITA 경로 입력 화면. -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ditamap Builder</title>
    <link rel="stylesheet" href="/user/css/DitamapBuilder.css?v=result-window-1">
</head>
<body>
<main class="ditamap-wrap">
    <header class="ditamap-header">
        <div>
            <h1>법규 Ditamap Builder</h1>
            <p>DITA 경로를 선택하거나 붙여넣어 DITAMAP 작업을 시작합니다.</p>
        </div>
    </header>

    <section class="ditamap-panel" aria-label="DITA 경로 선택">
        <div class="step-title">1.
            <span>1</span>
            <div>
                <strong>DITA 경로 선택</strong>
                <small>DITAMAP이 포함된 폴더 경로를 입력하세요.</small>
            </div>
        </div>

        <div class="ditamap-path-row">
            <label for="ditaPath">DITA 경로</label>
            <input id="ditaPath"
                   type="text"
                   autocomplete="off"
                   placeholder="DITA 폴더 경로를 입력하거나 붙여넣기">
            <button id="selectDitaFolder"
                    class="ditamap-btn secondary-btn"
                    type="button">선택</button>
            <button id="confirmDitaPath"
                    class="ditamap-btn primary-btn"
                    type="button">확인</button>
            <input id="ditaFolderInput"
                   type="file"
                   webkitdirectory
                   directory
                   multiple
                   hidden>
        </div>

        <div class="ditamap-test-builder-row"
             aria-label="테스트 Builder 선택">
            <button id="openDiffBuilder"
                    class="ditamap-btn secondary-btn"
                    type="button">1안 Builder 열기</button>
            <button id="openRealtimeBuilder"
                    class="ditamap-btn secondary-btn"
                    type="button">2안 Builder 열기</button>
        </div>

        <div id="ditamapMessage"
             class="status-message"
             role="status"
             aria-live="polite"
             hidden></div>

        <footer class="ditamap-actions">
            <button class="ditamap-btn secondary-btn close-btn"
                    type="button"
                    onclick="window.close()">닫기</button>
        </footer>
    </section>
</main>

<script>
const ditaPathInput =
    document.getElementById('ditaPath');
const folderInput =
    document.getElementById('ditaFolderInput');
const message =
    document.getElementById('ditamapMessage');

function showMessage(text, type){
    message.textContent = text;
    message.className = 'status-message';

    if(type){
        message.classList.add(type);
    }

    message.hidden = false;
}

document.getElementById('selectDitaFolder')
    .addEventListener('click', function(){
        folderInput.click();
    });

folderInput.addEventListener('change', function(){
    const firstFile = folderInput.files[0];

    if(!firstFile){
        return;
    }

    /*
     * 브라우저는 보안상 PC의 전체 폴더 경로를 자동으로 넘겨주지 않는다.
     * 선택한 폴더명은 참고로 넣고, 실제 전체 경로가 필요하면 사용자가 직접 붙여넣는다.
     */
    const folderName = firstFile.webkitRelativePath
        ? firstFile.webkitRelativePath.split('/')[0]
        : firstFile.name;

    ditaPathInput.value = folderName;
    showMessage(
        '선택한 폴더명입니다. 전체 경로가 필요하면 DITA 경로에 직접 붙여넣어 주세요.',
        'progress');
});

document.getElementById('confirmDitaPath')
    .addEventListener('click', function(){
        const path = ditaPathInput.value.trim();

        if(!path){
            showMessage('DITA 경로를 입력해 주세요.', 'error');
            ditaPathInput.focus();
            return;
        }

        const popupWidth = Math.min(
            Math.max(screen.availWidth - 80, 1600),
            screen.availWidth);
        const popupHeight = Math.min(
            Math.max(screen.availHeight - 80, 900),
            screen.availHeight);
        const popupLeft = Math.max(0, Math.floor((screen.availWidth - popupWidth) / 2));
        const popupTop = Math.max(0, Math.floor((screen.availHeight - popupHeight) / 2));
        const resultWindow = window.open(
            '/ditamap-builder/view?path=' + encodeURIComponent(path),
            'ditamapBuilderView',
            'width=' + popupWidth
                + ',height=' + popupHeight
                + ',left=' + popupLeft
                + ',top=' + popupTop
                + ',menubar=no,toolbar=no,location=no,status=no,scrollbars=yes,resizable=yes'
        );

        if(resultWindow){
            showMessage('새 창에서 DITAMAP 트리를 엽니다.', 'success');
            resultWindow.focus();
            try{
                resultWindow.resizeTo(popupWidth, popupHeight);
                resultWindow.moveTo(popupLeft, popupTop);
            }catch(error){
                // 브라우저 정책상 resize/move가 막히면 window.open 크기 옵션만 사용한다.
            }
        }else{
            showMessage('팝업 차단을 해제한 뒤 다시 확인을 눌러 주세요.', 'error');
        }
    });

function openTestBuilder(pathPrefix, windowName){
    const path = ditaPathInput.value.trim();

    if(!path){
        showMessage('DITA 경로를 입력해 주세요.', 'error');
        ditaPathInput.focus();
        return;
    }

    const testWindow = window.open(
            pathPrefix + '?path=' + encodeURIComponent(path),
            windowName,
            'width=1600,height=900,menubar=no,toolbar=no,location=no,status=no,scrollbars=yes,resizable=yes');

    if(testWindow){
        testWindow.focus();
        showMessage(windowName + ' 테스트 화면을 열었습니다.', 'success');
    }else{
        showMessage('팝업 차단을 해제한 뒤 다시 눌러 주세요.', 'error');
    }
}

document.getElementById('openDiffBuilder')
    .addEventListener('click', function(){
        openTestBuilder('/ditamap-builder/diff', 'ditamapBuilderDiff');
    });

document.getElementById('openRealtimeBuilder')
    .addEventListener('click', function(){
        openTestBuilder('/ditamap-builder/realtime', 'ditamapBuilderRealtime');
    });
</script>
</body>
</html>
