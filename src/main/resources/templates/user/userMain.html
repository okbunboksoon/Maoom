<!DOCTYPE html>
<!--
    로그인 후 PDF 리뷰, 컬러체크, 정제와 배치 기능으로 이동하는 메인 화면.
    UserController가 currentUserId/currentUserName을 Thymeleaf 모델로 전달한다.
    계정 대화상자는 /api/user/account와 /api/user/profile-image API를 사용한다.
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/user/css/UserMain.css?v=launcher-3">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://kit.fontawesome.com/51db22a717.js" crossorigin="anonymous"></script>
	<link href="https://fonts.googleapis.com/css2?family=Alata&display=swap" rel="stylesheet">
</head>

<body>

<!-- 현재 사용자 정보와 Spring Security 기본 /logout 요청을 제공한다. -->
<div class="account-actions">
    <button id="accountMenuButton"
            class="current-user-name"
            type="button"
            aria-haspopup="dialog"
            aria-controls="accountDialog"
            onclick="openAccountDialog()">
        <span class="account-menu-avatar">
            <img id="accountMenuAvatarImage"
                 th:src="@{/api/user/profile-image(userId=${currentUserId})}"
                 alt=""
                 onerror="this.hidden=true">
            <i class="fa-solid fa-user"></i>
        </span>
        <strong id="currentUserName"
                th:text="${currentUserName}">사용자</strong>님
        <i class="fa-solid fa-chevron-down account-chevron"></i>
    </button>
    <a class="admin-page-btn"
       th:if="${administrator}"
       href="/admin/main">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        관리자
    </a>
    <form class="logout-form" action="/logout" method="post">
        <button class="logout-btn" type="submit">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            로그아웃
        </button>
    </form>
</div>

<!-- 이름·비밀번호·프로필 이미지를 변경하는 계정 설정 대화상자. -->
<div id="accountDialogBackdrop"
     class="account-dialog-backdrop"
     hidden>
    <section id="accountDialog"
             class="account-dialog"
             role="dialog"
             aria-modal="true"
             aria-labelledby="accountDialogTitle">
        <div class="account-dialog-header">
            <div>
                <h2 id="accountDialogTitle">사용자 정보</h2>
                <p>이름과 비밀번호를 변경할 수 있습니다.</p>
            </div>
            <button class="account-close-btn"
                    type="button"
                    aria-label="닫기"
                    onclick="closeAccountDialog()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <form id="accountForm">
            <div class="account-profile-editor">
                <span class="account-profile-preview">
                    <img id="accountProfilePreview"
                         th:src="@{/api/user/profile-image(userId=${currentUserId})}"
                         alt="프로필 이미지"
                         onerror="this.hidden=true">
                    <i class="fa-solid fa-user"></i>
                </span>
                <div class="account-profile-controls">
                    <strong>프로필 이미지</strong>
                    <span>PNG, JPG, GIF, WebP · 최대 5MB</span>
                    <div>
                        <label class="account-image-select-btn"
                               for="accountProfileFile">이미지 변경</label>
                        <input id="accountProfileFile"
                               type="file"
                               accept="image/png,image/jpeg,image/gif,image/webp"
                               hidden>
                        <button id="accountImageDeleteButton"
                                class="account-image-delete-btn"
                                type="button">삭제</button>
                    </div>
                </div>
            </div>
            <label class="account-field">
                <span>이름</span>
                <input id="accountUserName"
                       type="text"
                       maxlength="20"
                       th:value="${currentUserName}"
                       required>
            </label>

            <label class="account-field">
                <span>아이디</span>
                <input id="accountUserId"
                       type="text"
                       th:value="${currentUserId}"
                       readonly>
            </label>

            <label class="account-field">
                <span>비밀번호</span>
                <input id="accountPassword"
                       type="password"
                       minlength="6"
                       maxlength="72"
                       autocomplete="new-password"
                       placeholder="변경할 때만 입력">
                <small>입력하지 않으면 기존 비밀번호가 유지됩니다.</small>
            </label>

            <p id="accountFormError"
               class="account-form-error"
               role="alert"></p>

            <div class="account-dialog-actions">
                <button class="account-cancel-btn"
                        type="button"
                        onclick="closeAccountDialog()">취소</button>
                <button id="accountSaveButton"
                        class="account-save-btn"
                        type="submit">수정</button>
            </div>
        </form>
    </section>
</div>

<main class="main-launcher" aria-label="Maoom Tool 기능 메뉴">
    <header class="launcher-header">
        <div>
            <h1>Maoom Tool</h1>
            <p>작업을 선택하세요.</p>
        </div>
        <label class="launcher-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="menuSearch"
                   type="search"
                   placeholder="기능 검색">
        </label>
    </header>

    <nav class="launcher-tabs" aria-label="기능 카테고리">
        <button class="launcher-tab active"
                type="button"
                data-category="전체">전체</button>
        <button class="launcher-tab"
                type="button"
                data-category="PDF">PDF</button>
        <button class="launcher-tab"
                type="button"
                data-category="DITA">DITA</button>
    </nav>

    <section id="menuGrid"
             class="launcher-grid"
             aria-label="기능 목록"></section>
    <p id="menuEmpty"
       class="launcher-empty"
       hidden>표시할 기능이 없습니다.</p>
</main>

<script>
// 계정 대화상자와 프로필 API에서 공통으로 사용하는 현재 사용자 화면 상태.
const accountBackdrop =
    document.getElementById('accountDialogBackdrop');
const accountForm =
    document.getElementById('accountForm');
const accountUserId =
    document.getElementById('accountUserId').value;
const accountProfileFile =
    document.getElementById('accountProfileFile');

const launcherMenus = [
    {
        title:'PDF 리뷰',
        description:'PDF 검토 및 댓글 관리',
        category:'PDF',
        icon:'fa-file-pdf',
        action:openPdfPopup
    },
    {
        title:'견적',
        description:'도안 컬러체크 엑셀 생성',
        category:'PDF',
        icon:'fa-table-list',
        action:openColorCheckPopup
    },
	{
	    title:'법규 Ditamap Builder',
	    description:'DITAMAP 경로 선택 및 구조 생성',
	    category:'DITA',
	    icon:'fa-sitemap',
	    action:openDitamapBuilderPopup
	},
    {
        title:'BER 반영',
        description:'BER 엑셀 생성 및 DB 반영',
        category:'DITA',
        icon:'fa-file-circle-check',
        action:openBerPopup
    },
    {
        title:'정제(X)',
        description:'DITA 정제 옵션 실행',
        category:'DITA',
        icon:'fa-wand-magic-sparkles',
        action:openRevisionPopup
    },
    {
        title:'배치(X)',
        description:'페이지 계산 및 배치',
        category:'PDF',
        icon:'fa-layer-group',
        action:function(){
            location.href = '/page/calc';
        }
    }
];

let activeMenuCategory = '전체';

// 캐시 무효화용 버전을 붙여 같은 파일 URL이라도 변경 직후 새 이미지를 요청한다.
function profileImageUrl(version){
    return '/api/user/profile-image?userId='
        + encodeURIComponent(accountUserId)
        + (version ? '&v=' + version : '');
}

// 메뉴 아바타와 대화상자 미리보기를 같은 최신 프로필 이미지로 갱신한다.
function refreshProfileImages(){
    const url = profileImageUrl(Date.now());

    [
        document.getElementById('accountMenuAvatarImage'),
        document.getElementById('accountProfilePreview')
    ].forEach(image => {
        image.hidden = false;
        image.src = url;
    });
}

// 프로필이 삭제되거나 조회되지 않으면 img를 숨기고 기본 사용자 아이콘을 보인다.
function hideProfileImages(){
    document.getElementById(
        'accountMenuAvatarImage'
    ).hidden = true;
    document.getElementById(
        'accountProfilePreview'
    ).hidden = true;
}

// JSON 또는 일반 문자열 형태의 서버 오류를 사용자에게 보여줄 한 문장으로 바꾼다.
function readErrorMessage(response, fallback){
    return response.text().then(text => {
        if(response.ok){
            return text ? JSON.parse(text) : {};
        }

        try{
            const body = JSON.parse(text);
            throw new Error(
                body.message || body.error || fallback
            );
        }catch(error){
            if(error instanceof SyntaxError){
                throw new Error(text || fallback);
            }
            throw error;
        }
    });
}

function openAccountDialog(){
    accountBackdrop.hidden = false;
    document.body.classList.add('dialog-open');
    document.getElementById('accountUserName').focus();
}

function closeAccountDialog(){
    accountBackdrop.hidden = true;
    document.body.classList.remove('dialog-open');
    document.getElementById('accountPassword').value = '';
    document.getElementById('accountFormError').textContent = '';
}

accountBackdrop.addEventListener('click', function(event){
    if(event.target === accountBackdrop){
        closeAccountDialog();
    }
});

// 선택한 이미지를 multipart/form-data로 UserController 업로드 API에 전송한다.
accountProfileFile.addEventListener('change', function(){
    const file = accountProfileFile.files[0];

    if(!file){
        return;
    }

    const errorElement =
        document.getElementById('accountFormError');
    const formData = new FormData();
    formData.append('file', file);
    errorElement.textContent = '';

    fetch('/api/user/profile-image', {
        method:'POST',
        body:formData
    })
    .then(response => readErrorMessage(
        response,
        '프로필 이미지 변경에 실패했습니다.'
    ))
    .then(() => {
        refreshProfileImages();
    })
    .catch(error => {
        errorElement.textContent = error.message;
    })
    .finally(() => {
        accountProfileFile.value = '';
    });
});

document.getElementById(
    'accountImageDeleteButton'
).addEventListener('click', function(){
    const errorElement =
        document.getElementById('accountFormError');
    errorElement.textContent = '';

    fetch('/api/user/profile-image', {
        method:'DELETE'
    })
    .then(response => readErrorMessage(
        response,
        '프로필 이미지 삭제에 실패했습니다.'
    ))
    .then(() => {
        hideProfileImages();
    })
    .catch(error => {
        errorElement.textContent = error.message;
    });
});

function isAdministrator(){
    return document.querySelector('.admin-page-btn') !== null;
}

function renderLauncherMenus(){
    const grid =
        document.getElementById('menuGrid');
    const empty =
        document.getElementById('menuEmpty');
    const keyword =
        document.getElementById('menuSearch')
        .value
        .trim()
        .toLowerCase();
    const administrator =
        isAdministrator();

    grid.innerHTML = '';

    const visibleMenus = launcherMenus.filter(menu => {
        if(menu.adminOnly && !administrator){
            return false;
        }

        if(activeMenuCategory !== '전체'
                && menu.category !== activeMenuCategory){
            return false;
        }

        if(!keyword){
            return true;
        }

        return menu.title.toLowerCase().includes(keyword)
            || menu.description.toLowerCase().includes(keyword)
            || menu.category.toLowerCase().includes(keyword);
    });

    visibleMenus.forEach(menu => {
        const button = document.createElement('button');
        button.className = 'launcher-card';
        button.type = 'button';
        button.addEventListener('click', menu.action);

        const content = document.createElement('span');
        content.className = 'launcher-card-content';

        const title = document.createElement('strong');
        title.textContent = menu.title;

        const description = document.createElement('small');
        description.textContent = menu.description;

        const category = document.createElement('span');
        category.className = 'launcher-card-category';
        category.textContent = menu.category;

        content.appendChild(title);
        content.appendChild(description);
        button.appendChild(content);
        button.appendChild(category);
        grid.appendChild(button);
    });

    empty.hidden = visibleMenus.length > 0;
}

document.querySelectorAll('.launcher-tab').forEach(tab => {
    tab.addEventListener('click', function(){
        activeMenuCategory = this.dataset.category;
        document.querySelectorAll('.launcher-tab')
            .forEach(item => item.classList.remove('active'));
        this.classList.add('active');
        renderLauncherMenus();
    });
});

document.getElementById('menuSearch')
    .addEventListener('input', renderLauncherMenus);

renderLauncherMenus();

document.addEventListener('keydown', function(event){
    if(event.key === 'Escape' && !accountBackdrop.hidden){
        closeAccountDialog();
    }
});

/*
 * 이름과 선택적 새 비밀번호를 UserAccountUpdateDto JSON으로 전송한다.
 * 비밀번호가 공백이면 UserService가 기존 비밀번호를 그대로 유지한다.
 */
accountForm.addEventListener('submit', function(event){
    event.preventDefault();

    const saveButton =
        document.getElementById('accountSaveButton');
    const errorElement =
        document.getElementById('accountFormError');
    const userName =
        document.getElementById('accountUserName').value.trim();
    const newPassword =
        document.getElementById('accountPassword').value;

    errorElement.textContent = '';
    saveButton.disabled = true;
    saveButton.textContent = '수정 중...';

    fetch('/api/user/account', {
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            userName:userName,
            newPassword:newPassword
        })
    })
    .then(async response => {
        const text = await response.text();

        if(!response.ok){
            try{
                const body = JSON.parse(text);
                throw new Error(
                    body.message || body.error || text
                );
            }catch(error){
                if(error instanceof SyntaxError){
                    throw new Error(text || '수정에 실패했습니다.');
                }
                throw error;
            }
        }

        return text ? JSON.parse(text) : {};
    })
    .then(user => {
        document.getElementById(
            'currentUserName'
        ).textContent = user.userName;
        document.getElementById(
            'accountUserName'
        ).value = user.userName;
        closeAccountDialog();
    })
    .catch(error => {
        errorElement.textContent = error.message;
    })
    .finally(() => {
        saveButton.disabled = false;
        saveButton.textContent = '수정';
    });
});

// PDF 목록은 별도 팝업 창으로 열어 메인 메뉴를 유지한다.
function openPdfPopup(){
    window.open(
        '/pdf/list',
        'pdfPopup',
        'width=600,height=800'
    );
}

// PDF 도안 컬러체크 엑셀 생성 화면을 별도 팝업으로 연다.
function openColorCheckPopup(){
    window.open(
        '/pdf/color-check',
        'colorCheckPopup',
        'width=680,height=620'
    );
}

// BER 반영 전용 화면을 연다.
function openBerPopup(){
    window.open(
        '/pdf/ber',
        'berPopup',
        'width=680,height=620'
    );
}

// DITAMAP Builder 경로 입력 화면을 별도 팝업 창으로 연다.
function openDitamapBuilderPopup(){
    window.open(
        '/ditamap-builder',
        'ditamapBuilderPopup',
        'width=680,height=300'
    );
}

// 정제 설정도 PDF 목록과 같은 크기의 별도 팝업 창으로 연다.
function openRevisionPopup(){
    window.open(
        '/revision/list',
        'revisionPopup',
        'width=600,height=800'
    );
}
</script>

</body>
</html>
