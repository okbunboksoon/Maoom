spring.application.name=MaoomTool
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/maoomtool?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create_comment_attachment.sql

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=maoomWeb.ire.user.dto\

app.google-drive.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG

app.slack.webhook-url=${SLACK_WEBHOOK_URL:}
app.slack.bot-token=${SLACK_BOT_TOKEN:}
app.comment.upload-dir=${user.home}/maoomtool-uploads/comments
app.user.profile-upload-dir=${user.home}/maoomtool-uploads/profiles
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
