spring.application.name=MaoomTool
spring.config.import=optional:file:./config/application-local.properties

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/maoomtool?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create_comment_attachment.sql,classpath:sql/create_drawing_color_check.sql,classpath:sql/create_ditamap_legal_target.sql

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=maoomWeb.ire.user.dto\

app.google-drive.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

app.slack.webhook-url=${SLACK_WEBHOOK_URL:}
app.slack.bot-token=${SLACK_BOT_TOKEN:}
app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:}
app.comment.upload-dir=${user.home}/maoomtool-uploads/comments
app.user.profile-upload-dir=${user.home}/maoomtool-uploads/profiles
# 컬러체크 결과 저장 폴더. 비워두면 Java 실행 계정의 Desktop/temp를 사용한다.
color-check.output-dir=${COLOR_CHECK_OUTPUT_DIR:}
# DITAMAP Builder는 배포 PC/서버가 접근할 수 있는 작업 루트만 읽고 쓴다.
# JAR 옆 config/application-local.properties 또는 환경변수에 공용 작업 경로를 등록한다.
# 예: ditamap.builder.allowed-roots=\\\\192.168.10.221\\QC_Docs;\\\\192.168.10.221\\kia_om26;\\\\fileserver\\dita
ditamap.builder.allowed-roots=${DITAMAP_BUILDER_ALLOWED_ROOTS:\\\\192.168.10.221\\QC_Docs;\\\\192.168.10.221\\kia_om26}
# 속성값 저장 후 프로젝트에 포함된 24_make-legal-hash.bat와 같은 Saxon 변환을 실행한다.
# legal-tool-dir을 비워두면 JAR 내부 revision-tool 리소스를 ${user.home}/.maoomtool/000-yyyyMMdd-HHmmss-revision-tool로 풀어서 사용한다.
# 외부 KUS 폴더를 강제로 쓰려면 JAR 옆 config/application-local.properties에서 이 값을 지정한다.
ditamap.builder.legal-hash.enabled=${DITAMAP_BUILDER_LEGAL_HASH_ENABLED:true}
ditamap.builder.legal-tool-dir=${DITAMAP_BUILDER_LEGAL_TOOL_DIR:}
# 생성된 컬러체크 엑셀은 도안 이미지 때문에 90MB를 넘을 수 있다.
# 검토 엑셀을 다시 업로드할 수 있도록 파일/요청 제한을 같은 크기로 넉넉히 잡는다.
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
server.servlet.session.timeout=2h


