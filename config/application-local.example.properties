# Copy this file to config/application-local.properties for local development.
# The real file is ignored by Git. Production should inject environment
# variables or mount an external secret file instead.
DB_URL=jdbc:mysql://localhost:3306/maoomtool?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
DB_USERNAME=maoomtool
DB_PASSWORD=change-me

# Prefer Application Default Credentials. If a JSON key is unavoidable,
# keep it outside the repository and provide only its absolute path.
GOOGLE_APPLICATION_CREDENTIALS=C:/secure/maoomtool-service-account.json

SLACK_WEBHOOK_URL=
SLACK_BOT_TOKEN=

# Comma-separated exact origins. Empty keeps Spring's same-origin default.
WEBSOCKET_ALLOWED_ORIGINS=http://localhost:8080

# Semicolon-separated DITA roots that the server is allowed to read/write.
DITAMAP_BUILDER_ALLOWED_ROOTS=V:/;H:/